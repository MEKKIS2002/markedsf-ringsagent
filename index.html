<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body,#root{min-height:100%;font-family:'Jost',sans-serif}
:root{
  --bg:#f8f6f3;--white:#fff;--ink:#1a1916;--mid:#7a7670;
  --line:#dedad4;--gold:#8a7a5a;--surface:#f2efe9;
  --red:#8a3a3a;--green:#3a6b4a;
}
body.dark{
  --bg:#111010;--white:#1c1b19;--ink:#f0ead6;--mid:#8a8278;
  --line:#2a2824;--gold:#c9a84c;--surface:#161514;
  --red:#e07070;--green:#6bcf8a;
}
body{background:var(--bg);color:var(--ink);transition:background .2s,color .2s}

/* LOCK */
.lock{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:9999}
.lock-box{background:var(--white);border:1px solid var(--line);padding:56px 48px;text-align:center;max-width:360px;width:90%}
.lock-logo{font-family:'Cormorant Garamond',serif;font-size:22px;letter-spacing:3px;text-transform:uppercase;color:var(--ink);margin-bottom:4px}
.lock-logo em{font-style:normal;color:var(--gold)}
.lock-sub{font-size:12px;color:var(--mid);margin-bottom:36px}
.lock-lbl{display:block;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--mid);margin-bottom:10px}
.lock-inp{width:100%;background:transparent;border:none;border-bottom:1px solid var(--line);color:var(--ink);padding:8px 0;font-family:'Cormorant Garamond',serif;font-size:28px;letter-spacing:8px;text-align:center;outline:none;transition:border .2s;margin-bottom:28px}
.lock-inp:focus{border-bottom-color:var(--ink)}

/* HEADER */
.header{background:var(--white);border-bottom:1px solid var(--line);padding:0 40px;display:flex;align-items:center;justify-content:space-between;height:60px;gap:12px;position:sticky;top:0;z-index:100}
.logo{font-family:'Cormorant Garamond',serif;font-size:19px;letter-spacing:3px;text-transform:uppercase;color:var(--ink)}
.logo em{font-style:normal;color:var(--gold)}
.hdr-right{display:flex;align-items:center;gap:10px}
.icon-btn{background:transparent;border:1px solid var(--line);color:var(--mid);width:32px;height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;transition:all .2s}
.icon-btn:hover{border-color:var(--ink);color:var(--ink)}
.ctx-badge{font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--gold);white-space:nowrap}

/* NAV */
.nav{background:var(--white);border-bottom:1px solid var(--line);padding:0 40px;display:flex;position:sticky;top:60px;z-index:99}
.tab{padding:14px 22px 12px;font-family:'Jost',sans-serif;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;border:none;background:transparent;color:var(--mid);border-bottom:1px solid transparent;cursor:pointer;transition:all .2s;transform:translateY(1px)}
.tab:hover{color:var(--ink)}.tab.active{color:var(--ink);border-bottom-color:var(--ink)}

/* CAMPAIGN BANNER */
.ctx-banner{background:var(--surface);border-bottom:1px solid var(--line);padding:8px 40px;display:flex;align-items:center;gap:10px;font-size:12px;color:var(--mid)}
.ctx-banner strong{color:var(--ink);font-weight:500}
.ctx-banner button{background:transparent;border:none;color:var(--mid);cursor:pointer;font-size:11px;text-decoration:underline}

/* SPLIT LAYOUT */
.page{display:flex;min-height:calc(100vh - 120px)}
.input-panel{width:400px;flex-shrink:0;padding:36px 36px;border-right:1px solid var(--line);overflow-y:auto}
.output-panel{flex:1;min-width:0;padding:36px 40px;overflow-y:auto}
@media(max-width:860px){.page{flex-direction:column}.input-panel{width:100%;border-right:none;border-bottom:1px solid var(--line)}}
@media(max-width:600px){.header,.nav{padding:0 16px}.ctx-banner{padding:8px 16px}.input-panel,.output-panel{padding:24px 16px}}

.page-title{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:300;letter-spacing:.5px;margin-bottom:4px}
.page-sub{font-size:12px;color:var(--mid);margin-bottom:28px}

/* FORM */
label{display:block;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--mid);margin-bottom:7px}
textarea,input[type="text"],input[type="number"]{width:100%;background:var(--white);border:1px solid var(--line);color:var(--ink);padding:10px 12px;font-family:'Jost',sans-serif;font-size:13px;outline:none;transition:border .2s;resize:vertical;border-radius:0}
textarea:focus,input:focus{border-color:var(--ink)}
.field{margin-bottom:20px}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:20px}

/* CHIPS */
.chips{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:20px}
.chip{padding:5px 13px;border:1px solid var(--line);font-size:10px;letter-spacing:1px;text-transform:uppercase;cursor:pointer;transition:all .2s;color:var(--mid);background:transparent;font-family:'Jost',sans-serif}
.chip:hover{border-color:var(--ink);color:var(--ink)}.chip.on{background:var(--ink);color:var(--bg);border-color:var(--ink)}

/* BUTTONS */
.btn{background:var(--ink);color:var(--bg);border:none;padding:12px 28px;font-family:'Jost',sans-serif;font-size:10px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:opacity .2s}
.btn:hover{opacity:.75}.btn:disabled{opacity:.3;cursor:not-allowed}
.btn-ghost{background:transparent;color:var(--mid);border:1px solid var(--line);padding:6px 13px;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;font-family:'Jost',sans-serif;transition:all .2s}
.btn-ghost:hover{border-color:var(--ink);color:var(--ink)}
.refine-btn{background:var(--surface);color:var(--mid);border:1px solid var(--line);padding:6px 11px;font-size:9px;letter-spacing:1px;text-transform:uppercase;cursor:pointer;font-family:'Jost',sans-serif;transition:all .2s}
.refine-btn:hover{background:var(--ink);color:var(--bg);border-color:var(--ink)}

/* MODE TOGGLE */
.mode-toggle{display:flex;border:1px solid var(--line);width:100%;margin-bottom:24px}
.mode-btn{flex:1;padding:9px 0;font-family:'Jost',sans-serif;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;border:none;background:transparent;color:var(--mid);cursor:pointer;transition:all .2s;text-align:center}
.mode-btn.on{background:var(--ink);color:var(--bg)}

/* SECTION DIVIDER inside input panel */
.section-sep{border:none;border-top:1px solid var(--line);margin:24px 0}

/* PLATFORM GUIDE */
.plat-guide{background:var(--surface);border:1px solid var(--line);padding:11px 13px;margin-bottom:20px;font-size:11px;line-height:1.7;color:var(--mid)}
.plat-guide strong{color:var(--ink);font-size:9px;letter-spacing:1px;text-transform:uppercase;display:block;margin-bottom:3px}
.plat-guide .best-time{color:var(--gold);font-size:10px;margin-top:3px}

/* CHAR COUNTER */
.char-row{display:flex;justify-content:space-between;margin-top:4px;margin-bottom:16px;font-size:10px}
.char-good{color:var(--green)}.char-warn{color:var(--gold)}.char-over{color:var(--red)}
.char-bar{height:2px;background:var(--line);margin-top:3px}
.char-bar-fill{height:100%;transition:width .3s,background .3s}

/* RESULT */
.result-box{background:var(--white);border:1px solid var(--line);margin-bottom:12px}
.result-head{padding:11px 16px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;gap:8px}
.result-tag{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--gold)}
.result-body{padding:20px;white-space:pre-wrap;line-height:1.85;font-size:13px;color:var(--ink)}
.result-body.streaming::after{content:'▍';animation:blink .8s infinite;color:var(--gold)}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
.btn-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:12px}

/* AB */
.ab-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
@media(max-width:700px){.ab-grid{grid-template-columns:1fr}}

/* HISTORY */
.history-section{margin-top:28px}
.hist-title{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--mid);margin-bottom:8px;display:flex;justify-content:space-between}
.hist-item{border:1px solid var(--line);margin-bottom:5px;cursor:pointer;transition:border .15s}
.hist-item:hover{border-color:var(--mid)}
.hist-head{padding:8px 12px;display:flex;align-items:center;justify-content:space-between;gap:8px}
.hist-preview{font-size:10px;color:var(--mid);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.hist-meta{font-size:9px;color:var(--gold);white-space:nowrap}
.hist-body{padding:12px;font-size:12px;line-height:1.7;white-space:pre-wrap;color:var(--ink);border-top:1px solid var(--line)}

/* LOADING / ERR */
.loading{display:flex;align-items:center;gap:10px;padding:16px 0;color:var(--mid);font-size:10px;letter-spacing:1.5px;text-transform:uppercase}
.dot{width:5px;height:5px;background:var(--gold);border-radius:50%;animation:p 1.2s infinite}
.dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
@keyframes p{0%,100%{opacity:.15;transform:scale(.8)}50%{opacity:1;transform:scale(1)}}
.err{color:var(--red);font-size:11px;padding:10px 12px;border:1px solid var(--red);margin-top:10px}

/* TOAST */
.toast-wrap{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);z-index:9000;pointer-events:none}
.toast{background:var(--ink);color:var(--bg);padding:9px 20px;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;opacity:0;transform:translateY(12px);transition:all .25s}
.toast.show{opacity:1;transform:translateY(0)}

/* DROP */
.drop{border:1px solid var(--line);padding:28px;text-align:center;cursor:pointer;transition:all .2s;background:var(--white);margin-bottom:16px}
.drop:hover,.drop.over{border-color:var(--ink)}
.drop-txt strong{display:block;font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:400;color:var(--ink);margin-bottom:3px}
.drop-txt{color:var(--mid);font-size:11px}

/* IMAGE GRID */
.img-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(90px,1fr));gap:6px;margin:10px 0}
.img-card{background:var(--white);border:1px solid var(--line);overflow:hidden;position:relative}
.img-thumb{width:100%;aspect-ratio:1;object-fit:cover;display:block}
.img-name{padding:5px 7px;font-size:9px;color:var(--mid);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.img-rm{position:absolute;top:3px;right:3px;width:16px;height:16px;background:var(--white);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;font-size:9px;cursor:pointer;opacity:0;transition:opacity .2s}
.img-card:hover .img-rm{opacity:1}
.num-badge{position:absolute;top:3px;left:3px;background:rgba(26,25,22,.65);color:#fff;padding:1px 5px;font-size:9px}
.order-badge{position:absolute;top:3px;left:3px;background:var(--ink);color:var(--bg);width:18px;height:18px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:500}

/* CALENDAR */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;margin-top:16px}
@media(max-width:700px){.cal-grid{grid-template-columns:repeat(3,1fr)}}
.cal-head{font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--mid);text-align:center;padding:6px 0;border-bottom:1px solid var(--line)}
.cal-card{background:var(--white);border:1px solid var(--line);padding:10px 8px;min-height:130px;font-size:10px;line-height:1.6;transition:border .2s;cursor:pointer}
.cal-card:hover,.cal-card.exp{border-color:var(--ink)}
.cal-date{font-family:'Cormorant Garamond',serif;font-size:18px;color:var(--ink);margin-bottom:2px}
.cal-type{font-size:8px;letter-spacing:1.5px;text-transform:uppercase;color:var(--gold);margin-bottom:4px}
.cal-time{font-size:9px;color:var(--gold);margin-top:3px}
.cal-caption{margin-top:7px;font-size:10px;color:var(--ink);line-height:1.6;padding-top:7px;border-top:1px solid var(--line);white-space:pre-wrap}
.cal-empty{background:var(--bg);border:1px solid var(--line);min-height:130px}

/* SEASON LIST */
.season-list{display:flex;flex-direction:column;gap:5px;margin-top:10px}
.season-item{display:flex;gap:10px;align-items:flex-start;font-size:11px}
.season-date{font-size:9px;color:var(--gold);width:52px;flex-shrink:0;padding-top:1px}
.season-evt{color:var(--ink);line-height:1.5}

/* SETTINGS */
.settings-overlay{position:fixed;inset:0;background:rgba(26,25,22,.45);z-index:500;display:flex;justify-content:flex-end}
.settings-panel{background:var(--white);width:340px;height:100%;overflow-y:auto;padding:28px 24px;border-left:1px solid var(--line)}
.settings-title{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:300;margin-bottom:20px;display:flex;align-items:center;justify-content:space-between}
.settings-sec{margin-bottom:24px}
.settings-sec h3{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--mid);margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--line)}
.kbd{background:var(--surface);border:1px solid var(--line);padding:1px 6px;font-size:10px;border-radius:2px}

.empty-state{padding:60px 0;text-align:center;color:var(--mid);font-size:12px}
.divider{border:none;border-top:1px solid var(--line);margin:24px 0}
</style>
</head>

/* ── NOVOOI SYSTEM PROMPT ── */
const NOVOOI = `Du er Novooi sin dedikerte innholdsstrateg og markedsføringskopist.

NOVOOI ER:

ABSOLUTTE SKRIVEREGLER:

/* ── API ── */
async function streamClaude(key, msgs, onChunk, onDone, onError, extraSys) {
  const sys = extraSys ? NOVOOI+"\n\n"+extraSys : NOVOOI;
  let resp;
  try {
    resp = await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:2000,stream:true,system:sys,messages:msgs})});
  } catch(e){ onError(e.message); return; }
  if(!resp.ok){ try{ const d=await resp.json(); onError(d.error?.message||"API-feil"); }catch(e){ onError("API-feil "+resp.status); } return; }
  const reader=resp.body.getReader(), dec=new TextDecoder();
  let buf="";
  try {
    while(true){
      const {done,value}=await reader.read(); if(done) break;
      buf+=dec.decode(value,{stream:true});
      const lines=buf.split("\n"); buf=lines.pop()||"";
      for(const line of lines){
        if(!line.startsWith("data: ")) continue;
        const raw=line.slice(6).trim(); if(!raw||raw==="[DONE]") continue;
        try{
          const evt=JSON.parse(raw);
          if(evt.type==="content_block_delta"&&evt.delta?.type==="text_delta") onChunk(evt.delta.text);
          if(evt.type==="message_stop"){ onDone(); return; }
        }catch(e){}
      }
    }
  } catch(e){ onError(e.message); return; }
  onDone();
}

async function callClaudeJSON(key, msgs) {
  const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:2000,system:NOVOOI+"\n\nReturner KUN gyldig JSON, ingen backticks, ingen annen tekst.",messages:msgs})});
  const d=await r.json(); if(d.error) throw new Error(d.error.message);
  return d.content.map(b=>b.text||"").join("");
}

async function validateKey(k){
  const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","x-api-key":k,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify({model:"claude-haiku-4-5-20251001",max_tokens:5,messages:[{role:"user",content:"hi"}]})});
  const d=await r.json(); if(d.error) throw new Error(d.error.message); return true;
}

/* ── UTILS ── */
function useToast(){
  const [s,setS]=useState({msg:"",show:false});
  const fire=useCallback(msg=>{ setS({msg,show:true}); setTimeout(()=>setS(x=>({...x,show:false})),2000); },[]);
  return [s,fire];
}
function saveHist(tab,item){ try{ const h=JSON.parse(localStorage.getItem("nv_h_"+tab)||"[]"); h.unshift(item); localStorage.setItem("nv_h_"+tab,JSON.stringify(h.slice(0,5))); }catch(e){} }
function getHist(tab){ try{ return JSON.parse(localStorage.getItem("nv_h_"+tab)||"[]"); }catch(e){ return []; } }

/* ── SMALL COMPONENTS ── */
function Toast({msg,show}){ return <div className="toast-wrap"><div className={`toast${show?" show":""}`}>{msg}</div></div>; }

function CopyBtn({text,toast,label}){
  return <button className="btn-ghost" onClick={()=>{navigator.clipboard.writeText(text);toast("Kopiert!");}}>{label||"Kopier"}</button>;
}

function CharCounter({text,plat}){
  if(!text) return null;
  const g=PLAT_GUIDE[plat]||PLAT_GUIDE.Instagram;
  const len=text.length, pct=Math.min(len/g.max*100,100);
  const cls=len<g.ideal[0]?"warn":len<=g.ideal[1]?"good":len<=g.max?"warn":"over";
  const col=cls==="good"?"var(--green)":cls==="over"?"var(--red)":"var(--gold)";
  return <div>
    <div className="char-row">
      <span className={`char-${cls}`}>{len} / {g.max} tegn</span>
      <span style={{color:"var(--mid)"}}>Ideelt: {g.ideal[0]}–{g.ideal[1]}</span>
    </div>
    <div className="char-bar"><div className="char-bar-fill" style={{width:pct+"%",background:col}}/></div>
  </div>;
}

function PlatformGuide({plat}){
  const g=PLAT_GUIDE[plat]; if(!g) return null;
  return <div className="plat-guide">
    <strong>{plat}</strong>
    {g.tip}<br/>Hashtags: {g.hashtags} · Format: {g.format}
    <div className="best-time">Beste tid: {g.bestTime}</div>
  </div>;
}

function HistoryPanel({tab,toast}){
  const [items]=useState(()=>getHist(tab));
  const [open,setOpen]=useState(null);
  if(!items.length) return null;
  return <div className="history-section">
    <div className="hist-title"><span>Historikk</span><span style={{color:"var(--mid)"}}>{items.length} siste</span></div>
    {items.map((it,i)=><div key={i} className="hist-item">
      <div className="hist-head" onClick={()=>setOpen(open===i?null:i)}>
        <span className="hist-preview">{it.text?.slice(0,55)}…</span>
        <span className="hist-meta">{it.plat} · {it.date}</span>
      </div>
      {open===i&&<div className="hist-body">{it.text}<div style={{marginTop:8}}><CopyBtn text={it.text} toast={toast}/></div></div>}
    </div>)}
  </div>;
}

/* ══════════════════════════════════════
   INNHOLD + BILDERREKKEFØLGE (merged)
══════════════════════════════════════ */
function MainTab({k, state, setState, context, brandMemory, showToast}){
  const {
    mode, topic, tone, plat, extra, res, abMode, load, err,
    focus, posts, cal, expandedDay,
    imgs, orderPlat, orderGoal, orderRes, orderLoad, orderErr, orderOver, order
  } = state;
  const set=(key,val)=>setState(s=>({...s,[key]:val}));
  const streamRef=useRef(""); const orderStreamRef=useRef("");
  const dropRef=useRef();

  const buildCtx=()=>{
    let x="";
    if(brandMemory) x+=`\nMERKEVARE-NOTATER: ${brandMemory}`;
    if(context) x+=`\nKAMPANJEKONTEKST: ${context}`;
    return x;
  };

  /* ── Caption ── */
  const genCaption=async()=>{
    if(!topic.trim()){set("err","Beskriv innlegget.");return;}
    set("err","");set("load",true);set("res","");
    streamRef.current="";
    const abInstr=abMode
      ?"Lag TO klart forskjellige captions. Merk VARIANT A (produktfokusert) og VARIANT B (verdifokusert/storytelling)."
      :"Lag 3 caption-varianter. Merk VARIANT 1, VARIANT 2, VARIANT 3.";
    const prompt=`${abInstr}\n\nPlattform: ${plat}\n${PLAT_PROMPT[plat]||""}\nTema: ${topic}\nTone: ${tone}\n${extra?`Tillegg: ${extra}`:""}\n${buildCtx()}\nIngen em-dash. Ikke AI-aktig.`;
    await streamClaude(k,[{role:"user",content:prompt}],
      c=>{streamRef.current+=c;set("res",streamRef.current);},
      ()=>{ set("load",false); saveHist("caption",{text:streamRef.current,plat,tone,topic,date:new Date().toLocaleDateString("no")}); },
      e=>{set("err",e);set("load",false);}
    );
  };

  const refine=async instr=>{
    if(!res) return; set("load",true);set("res",""); streamRef.current="";
    await streamClaude(k,[{role:"user",content:`Ta denne teksten og ${instr}. Behold Novooi sin tone. Ingen em-dash:\n\n${res}`}],
      c=>{streamRef.current+=c;set("res",streamRef.current);},
      ()=>set("load",false),
      e=>{set("err",e);set("load",false);}
    );
  };

  /* ── Calendar ── */
  const genCalendar=async()=>{
    set("err","");set("load",true);set("cal",null);
    try{
      const r=await callClaudeJSON(k,[{role:"user",content:
        `Lag ukentlig innleggskalender for Novooi på ${plat}.\n${focus?`Ukens tema: ${focus}\n`:""}Antall innlegg: ${posts}.\n${buildCtx()}\nLag FERDIG caption per innlegg i Novooi sin tone. Ingen em-dash.\n\nReturner KUN JSON:\n{"innlegg":[{"dag":"Man","dato":1,"type":"Post","tema":"...","caption":"Ferdig caption med emneknagger...","tidspunkt":"09:00"}]}`
      }]);
      const clean=r.replace(/```json|```/g,"").trim();
      set("cal",JSON.parse(clean).innlegg||[]);
    }catch(e){set("err","Parse-feil: "+e.message);}
    set("load",false);
  };

  const byDay=cal?DAYS.reduce((a,d)=>{a[d]=cal.find(p=>p.dag===d);return a},{}):{};

  /* ── Order images ── */
  const loadImgs=files=>{
    Array.from(files).forEach(f=>{
      if(!f.type.startsWith("image/")) return;
      const r=new FileReader();
      r.onload=e=>setState(s=>({...s,imgs:[...s.imgs,{name:f.name,mime:f.type,data:e.target.result.split(",")[1],url:e.target.result}]}));
      r.readAsDataURL(f);
    });
  };

  const moveImg=(from,to)=>{
    setState(s=>{
      const a=[...s.imgs]; const [item]=a.splice(from,1); a.splice(to,0,item);
      return {...s,imgs:a,orderRes:"",order:[]};
    });
  };

  const analyzeOrder=async()=>{
    if(imgs.length<2){set("orderErr","Last opp minst 2 bilder.");return;}
    set("orderErr","");set("orderLoad",true);set("orderRes","");set("order",[]);
    orderStreamRef.current="";
    const content=[];
    imgs.forEach((img,i)=>{
      content.push({type:"text",text:`BILDE ${i+1}: "${img.name}"`});
      content.push({type:"image",source:{type:"base64",media_type:img.mime,data:img.data}});
    });
    content.push({type:"text",text:`${imgs.length} bilder fra Novooi.\nPlattform: ${orderPlat}${orderGoal?`\nMål: ${orderGoal}`:""}\n\n1. Beskriv hvert bilde kort\n2. Skriv NØYAKTIG: "Anbefalt rekkefølge: X, X, X"\n3. Begrunnelse (visuell flyt, storytelling)\n4. Caption-ide per bilde\n\nIngen em-dash.`});
    await streamClaude(k,[{role:"user",content}],
      c=>{orderStreamRef.current+=c;set("orderRes",orderStreamRef.current);},
      ()=>{
        set("orderLoad",false);
        const m=orderStreamRef.current.match(/[Aa]nbefalt\s+rekkef[øo]lge:\s*([0-9,\s]+)/);
        if(m){ const nums=m[1].split(/[,\s]+/).map(n=>parseInt(n.trim())-1).filter(n=>!isNaN(n)&&n>=0&&n<imgs.length); if(nums.length>0) set("order",nums); }
      },
      e=>{set("orderErr",e);set("orderLoad",false);}
    );
  };

  const orderedImgs=order.length>0?order.map(i=>imgs[i]).filter(Boolean):[];

  return <div className="page">
    {/* ═══ INPUT PANEL ═══ */}
    <div className="input-panel">
      <p className="page-title">Innhold</p>
      <p className="page-sub"><span className="kbd">⌘↵</span> for å generere</p>

      <div className="mode-toggle">
        <button className={`mode-btn${mode==="single"?" on":""}`} onClick={()=>set("mode","single")}>Enkelt innlegg</button>
        <button className={`mode-btn${mode==="week"?" on":""}`} style={{borderLeft:"1px solid var(--line)"}} onClick={()=>set("mode","week")}>Ukeplan</button>
      </div>

      {/* ── ENKELT INNLEGG ── */}
      {mode==="single"&&<>
        <label>Plattform</label>
        <div className="chips">{PLAT.map(p=><button key={p} className={`chip${plat===p?" on":""}`} onClick={()=>set("plat",p)}>{p}</button>)}</div>
        <PlatformGuide plat={plat}/>
        <div className="field">
          <label>Beskriv innlegget</label>
          <textarea rows={3} id="main-topic" placeholder="F.eks: Vi lanserer Gudrun, puter og metertekstil i lin og ull..." value={topic} onChange={e=>set("topic",e.target.value)}/>
          <CharCounter text={topic} plat={plat}/>
        </div>
        <label>Tone</label>
        <div className="chips">{TONES.map(t=><button key={t} className={`chip${tone===t?" on":""}`} onClick={()=>set("tone",t)}>{t}</button>)}</div>
        <div className="field">
          <label>Tilleggsinfo (valgfritt)</label>
          <textarea rows={2} placeholder="CTA, lenke i bio, kampanjekode..." value={extra} onChange={e=>set("extra",e.target.value)}/>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:16}}>
          <button className={`chip${abMode?" on":""}`} onClick={()=>set("abMode",!abMode)}>A/B test</button>
          <span style={{fontSize:10,color:"var(--mid)"}}>To vinklinger side om side</span>
        </div>
        <button id="main-gen-btn" className="btn" onClick={genCaption} disabled={load} style={{width:"100%"}}>
          {load?"Genererer…":"Generer captions"}
        </button>
        {err&&<p className="err">{err}</p>}
      </>}

      {/* ── UKEPLAN ── */}
      {mode==="week"&&<>
        <div className="field">
          <label>Ukens tema / leverandør</label>
          <textarea rows={3} placeholder="F.eks: Ny leverandør Gudrun, Håndverksbiennalen, vårkollesjonen..." value={focus} onChange={e=>set("focus",e.target.value)}/>
        </div>
        <label>Plattform</label>
        <div className="chips">{PLAT.map(p=><button key={p} className={`chip${plat===p?" on":""}`} onClick={()=>set("plat",p)}>{p}</button>)}</div>
        <div className="field">
          <label>Antall innlegg</label>
          <input type="number" min="1" max="7" value={posts} onChange={e=>set("posts",e.target.value)}/>
        </div>
        <button id="main-gen-btn" className="btn" onClick={genCalendar} disabled={load} style={{width:"100%"}}>
          {load?"Planlegger…":"Lag ukeplan med captions"}
        </button>
        {err&&<p className="err">{err}</p>}
        <hr className="section-sep"/>
        <label>Kommende hendelser</label>
        <div className="season-list">
          {SEASON_EVENTS.map((it,i)=><div key={i} className="season-item">
            <span className="season-date">{it.d}</span>
            <span className="season-evt">{it.e}</span>
          </div>)}
        </div>
      </>}

      {/* ── BILDERREKKEFØLGE (lenger ned i panelet) ── */}
      <hr className="section-sep"/>
      <label style={{marginBottom:12}}>Bilderrekkefølge</label>
      <div className={`drop${orderOver?" over":""}`} style={{minHeight:72,padding:"20px"}}
        onDragOver={e=>{e.preventDefault();set("orderOver",true);}}
        onDragLeave={()=>set("orderOver",false)}
        onDrop={e=>{e.preventDefault();set("orderOver",false);loadImgs(e.dataTransfer.files);}}
        onClick={()=>dropRef.current.click()}>
        <div className="drop-txt"><strong>Dra bilder hit</strong>Hold ⌘/Ctrl for å velge flere</div>
        <input ref={dropRef} type="file" accept="image/*" multiple style={{display:"none"}} onChange={e=>loadImgs(e.target.files)}/>
      </div>
      {imgs.length>0&&<>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
          <label style={{margin:0}}>{imgs.length} bilder</label>
          <button className="btn-ghost" onClick={()=>setState(s=>({...s,imgs:[],orderRes:"",order:[]}))}>Fjern alle</button>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:3,marginBottom:14}}>
          {imgs.map((img,i)=><div key={i} style={{display:"flex",alignItems:"center",gap:7,background:"var(--white)",border:"1px solid var(--line)",padding:"5px 8px"}}>
            <img src={img.url} alt="" style={{width:30,height:30,objectFit:"cover",border:"1px solid var(--line)"}}/>
            <span style={{flex:1,fontSize:9,color:"var(--mid)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{i+1}. {img.name}</span>
            <div style={{display:"flex",gap:2}}>
              <button className="btn-ghost" style={{padding:"1px 6px"}} disabled={i===0} onClick={()=>moveImg(i,i-1)}>↑</button>
              <button className="btn-ghost" style={{padding:"1px 6px"}} disabled={i===imgs.length-1} onClick={()=>moveImg(i,i+1)}>↓</button>
            </div>
          </div>)}
        </div>
        <label>Plattform for rekkefølge</label>
        <div className="chips">{PLAT.map(p=><button key={p} className={`chip${orderPlat===p?" on":""}`} onClick={()=>set("orderPlat",p)}>{p}</button>)}</div>
        <div className="field">
          <label>Kampanjemål (valgfritt)</label>
          <input type="text" placeholder="F.eks. ny leverandør, sesong..." value={orderGoal} onChange={e=>set("orderGoal",e.target.value)}/>
        </div>
        <button className="btn" onClick={analyzeOrder} disabled={orderLoad||imgs.length<2} style={{width:"100%"}}>
          {orderLoad?"Analyserer…":"Analyser rekkefølge"}
        </button>
        {orderErr&&<p className="err">{orderErr}</p>}
      </>}
    </div>

    {/* ═══ OUTPUT PANEL ═══ */}
    <div className="output-panel">

      {/* Caption output */}
      {mode==="single"&&<>
        {load&&<div className="loading"><div className="dot"/><div className="dot"/><div className="dot"/>Skriver captions</div>}
        {res&&<>
          {abMode?(
            <div className="ab-grid">
              {["A","B"].map(v=>{
                const idx=res.indexOf("VARIANT "+v); const next=v==="A"?res.indexOf("VARIANT B"):-1;
                const text=idx>=0?(next>0?res.slice(idx,next):res.slice(idx)).replace("VARIANT "+v+":","").trim():res;
                return <div key={v} className="result-box">
                  <div className="result-head"><span className="result-tag">Variant {v}</span><CopyBtn text={text} toast={showToast}/></div>
                  <div className="result-body">{text}</div>
                </div>;
              })}
            </div>
          ):(
            <div className="result-box">
              <div className="result-head"><span className="result-tag">Caption-varianter</span><CopyBtn text={res} toast={showToast}/></div>
              <div className={`result-body${load?" streaming":""}`}>{res}</div>
            </div>
          )}
          <CharCounter text={res} plat={plat}/>
          {!load&&<div className="btn-row">
            <button className="refine-btn" onClick={()=>refine("gjør den kortere og mer konsis")}>Kortere</button>
            <button className="refine-btn" onClick={()=>refine("gjør den mer formell og raffinert")}>Mer formell</button>
            <button className="refine-btn" onClick={()=>refine("gjør den litt mer uformell og personlig")}>Mer uformell</button>
            <button className="refine-btn" onClick={()=>refine("bytt ut hashtagsene med mer relevante")}>Bytt hashtags</button>
            <button className="refine-btn" onClick={()=>refine("skriv den helt om med en ny vinkling")}>Ny vinkling</button>
          </div>}
          <HistoryPanel tab="caption" toast={showToast}/>
        </>}
        {!res&&!load&&<div className="empty-state">Fyll inn innlegg og trykk generer</div>}
      </>}

      {/* Ukeplan output */}
      {mode==="week"&&<>
        {load&&<div className="loading"><div className="dot"/><div className="dot"/><div className="dot"/>Lager ukeplan</div>}
        {cal&&<>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
            <span style={{fontSize:10,color:"var(--mid)",letterSpacing:"1px",textTransform:"uppercase"}}>Klikk dag for caption</span>
            <CopyBtn toast={showToast} text={cal.filter(p=>p.caption).map(p=>`${p.dag} — ${p.tema}\n${p.caption}`).join("\n\n---\n\n")} label="Kopier alle"/>
          </div>
          <div className="cal-grid">
            {DAYS.map(d=><div key={d} className="cal-head">{d}</div>)}
            {DAYS.map(d=>{const p=byDay[d]; return p
              ?<div key={d} className={`cal-card${expandedDay===d?" exp":""}`} onClick={()=>set("expandedDay",expandedDay===d?null:d)}>
                <div className="cal-date">{p.dato||""}</div>
                <div className="cal-type">{p.type}</div>
                <div style={{fontWeight:500,color:"var(--ink)",fontSize:10,marginBottom:2}}>{p.tema}</div>
                {p.tidspunkt&&<div className="cal-time">{p.tidspunkt}</div>}
                {expandedDay===d&&p.caption&&<div className="cal-caption">{p.caption}<div style={{marginTop:6}}><CopyBtn text={p.caption} toast={showToast}/></div></div>}
                {expandedDay!==d&&<div style={{fontSize:8,color:"var(--gold)",marginTop:5,letterSpacing:"1px",textTransform:"uppercase"}}>Trykk for caption</div>}
              </div>
              :<div key={d} className="cal-empty"/>;
            })}
          </div>
          <hr className="divider"/>
          <div style={{marginBottom:12,fontSize:9,letterSpacing:"2px",textTransform:"uppercase",color:"var(--mid)"}}>Alle captions</div>
          {cal.filter(p=>p.caption).map((p,i)=><div key={i} className="result-box" style={{marginBottom:10}}>
            <div className="result-head"><span className="result-tag">{p.dag} — {p.tema}</span><CopyBtn text={p.caption} toast={showToast}/></div>
            <div className="result-body">{p.caption}</div>
          </div>)}
        </>}
        {!cal&&!load&&<div className="empty-state">Fyll inn tema og trykk generer</div>}
      </>}

      {/* Order output */}
      {(orderLoad||orderRes||orderedImgs.length>0)&&<>
        <hr className="divider"/>
        <div style={{marginBottom:10,fontSize:9,letterSpacing:"2px",textTransform:"uppercase",color:"var(--mid)"}}>Bilderrekkefølge</div>
        {orderLoad&&<div className="loading"><div className="dot"/><div className="dot"/><div className="dot"/>Analyserer bilder</div>}
        {orderedImgs.length>0&&<>
          <div style={{marginBottom:8}}><label>Anbefalt rekkefølge</label></div>
          <div className="img-grid" style={{marginBottom:20}}>
            {orderedImgs.map((img,pos)=><div key={pos} className="img-card">
              <img className="img-thumb" src={img.url} alt={img.name}/>
              <div className="img-name">{img.name}</div>
              <div className="order-badge">{pos+1}</div>
            </div>)}
          </div>
        </>}
        {orderRes&&<div className="result-box">
          <div className="result-head"><span className="result-tag">Analyse og strategi</span><CopyBtn text={orderRes} toast={showToast}/></div>
          <div className="result-body">{orderRes}</div>
        </div>}
      </>}
    </div>
  </div>;
}

    <div className="settings-panel">

      <div className="settings-sec">
        <h3>Kampanjekontekst denne uken</h3>
        <p style={{fontSize:11,color:"var(--mid)",marginBottom:10,lineHeight:1.6}}>Injiseres automatisk i alle prompts.</p>

        <h3>Tastatursnarveier</h3>
        <div style={{fontSize:11,lineHeight:2.2,color:"var(--ink)"}}>

/* ── LOCK SCREEN ── */
function LockScreen({onUnlock}){
  const [suffix,setSuffix]=useState("");
  const [checking,setChecking]=useState(false);
  const [err,setErr]=useState("");
  const attempt=async()=>{
    if(!suffix.trim()) return; setErr(""); setChecking(true);
    try{ await validateKey(KEY_PREFIX+suffix.trim()); onUnlock(KEY_PREFIX+suffix.trim()); }
    catch(e){ setErr("Feil tilgangskode — prøv igjen."); setSuffix(""); }
    setChecking(false);
  };
  return <div className="lock">
    <div className="lock-box">
      <div className="lock-logo">markeds<em>agent</em></div>
      <div className="lock-sub">Novooi — Norsk design, interiør og kunsthåndverk</div>
      <span className="lock-lbl">Skriv inn tilgangskoden</span>
      <input className="lock-inp" type="password" maxLength={4} placeholder="····" value={suffix}
        onChange={e=>{setSuffix(e.target.value);setErr("");}}
        onKeyDown={e=>e.key==="Enter"&&!checking&&attempt()}
        style={err?{borderBottomColor:"var(--red)"}:{}} autoFocus disabled={checking}/>
      {err&&<p style={{fontSize:11,color:"var(--red)",marginTop:-18,marginBottom:16}}>{err}</p>}
      {checking
        ?<div className="loading" style={{justifyContent:"center",padding:"0 0 14px"}}><div className="dot"/><div className="dot"/><div className="dot"/>Verifiserer</div>
        :<button className="btn" style={{width:"100%"}} onClick={attempt}>Logg inn</button>}
    </div>
  </div>;
}

/* ── APP ── */
const INIT_MAIN = {
  mode:"single", topic:"", tone:"Profesjonell", plat:"Instagram", extra:"", res:"", abMode:false, load:false, err:"",
  focus:"", posts:"5", cal:null, expandedDay:null,
  imgs:[], orderPlat:"Instagram", orderGoal:"", orderRes:"", orderLoad:false, orderErr:"", orderOver:false, order:[]
};

function App(){
  const [key,setKey]=useState("");
  const [mainState,setMainState]=useState(INIT_MAIN);
  const [dark,setDark]=useState(()=>{ try{ return localStorage.getItem("nv_dark")==="1"; }catch(e){ return false; } });
  const [context,setContext]=useState("");
  const [brandMemory,setBrandMemory]=useState(()=>{ try{ return localStorage.getItem("nv_brand_mem")||""; }catch(e){ return ""; } });
  const [showSettings,setShowSettings]=useState(false);
  const [toastState,showToast]=useToast();

  useEffect(()=>{ document.body.classList.toggle("dark",dark); try{ localStorage.setItem("nv_dark",dark?"1":"0"); }catch(e){} },[dark]);

  useEffect(()=>{
    const h=e=>{
      if((e.metaKey||e.ctrlKey)&&e.key==="Enter"){ e.preventDefault(); document.getElementById("main-gen-btn")?.click(); }
    };
    document.addEventListener("keydown",h);
    return()=>document.removeEventListener("keydown",h);
  },[]);

  if(!key) return <LockScreen onUnlock={setKey}/>;

  return <>
    <div className="header">
      <div className="logo">markeds<em>agent</em></div>
      <div className="hdr-right">
        {context&&<span className="ctx-badge">✦ Kampanje aktiv</span>}
        <button className="icon-btn" title="Innstillinger" onClick={()=>setShowSettings(true)}>⚙</button>
        <button className="icon-btn" title={dark?"Lyst modus":"Mørkt modus"} onClick={()=>setDark(d=>!d)}>{dark?"☀":"☾"}</button>
        <button className="btn-ghost" onClick={()=>setKey("")}>Logg ut</button>
      </div>
    </div>
    {context&&<div className="ctx-banner">
      <strong>Denne uken:</strong> {context}
      <button onClick={()=>setContext("")}>Fjern</button>
    </div>}
    <MainTab k={key} state={mainState} setState={setMainState} context={context} brandMemory={brandMemory} showToast={showToast}/>
    {showSettings&&<SettingsPanel context={context} setContext={setContext} brandMemory={brandMemory} setBrandMemory={setBrandMemory} onClose={()=>setShowSettings(false)} showToast={showToast}/>}
    <Toast msg={toastState.msg} show={toastState.show}/>
  </>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
