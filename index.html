<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body,#root{height:100%;font-family:'Jost',sans-serif;background:#f8f6f3}
:root{--bg:#f8f6f3;--white:#fff;--ink:#1a1916;--mid:#7a7670;--line:#dedad4;--gold:#8a7a5a}
.app{min-height:100vh;background:var(--bg);color:var(--ink)}

/* LOCK */
.lock{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:9999}
.lock-box{background:var(--white);border:1px solid var(--line);padding:56px 48px;text-align:center;max-width:360px;width:90%}
.lock-logo{font-family:'Cormorant Garamond',serif;font-size:22px;letter-spacing:3px;text-transform:uppercase;color:var(--ink);margin-bottom:4px}
.lock-logo em{font-style:normal;color:var(--gold)}
.lock-sub{font-size:12px;color:var(--mid);letter-spacing:.5px;margin-bottom:36px}
.lock-label{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--mid);margin-bottom:10px;display:block}
.lock-input{width:100%;background:transparent;border:none;border-bottom:1px solid var(--line);color:var(--ink);padding:8px 0;font-family:'Cormorant Garamond',serif;font-size:28px;letter-spacing:8px;text-align:center;outline:none;transition:border .2s;margin-bottom:28px}
.lock-input:focus{border-bottom-color:var(--ink)}

/* HEADER */
.header{background:var(--white);border-bottom:1px solid var(--line);padding:0 48px;display:flex;align-items:center;justify-content:space-between;height:64px;gap:16px}
.logo{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:400;letter-spacing:3px;text-transform:uppercase;color:var(--ink)}
.logo em{font-style:normal;color:var(--gold)}
.hdr-right{display:flex;align-items:center;gap:12px}
.api-ok{font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--gold)}

/* NAV */
.nav{background:var(--white);border-bottom:1px solid var(--line);padding:0 48px;display:flex;overflow-x:auto}
.tab{padding:16px 22px 14px;font-family:'Jost',sans-serif;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;border:none;background:transparent;color:var(--mid);border-bottom:1px solid transparent;cursor:pointer;transition:all .2s;transform:translateY(1px);white-space:nowrap}
.tab:hover{color:var(--ink)}.tab.active{color:var(--ink);border-bottom-color:var(--ink)}

/* MAIN */
.main{padding:56px 48px;max-width:900px}
@media(max-width:640px){.header,.nav{padding:0 20px}.main{padding:32px 20px}}
.page-title{font-family:'Cormorant Garamond',serif;font-size:36px;font-weight:300;letter-spacing:1px;margin-bottom:6px;line-height:1.2}
.page-sub{font-size:13px;color:var(--mid);margin-bottom:32px}

/* MODE TOGGLE */
.mode-toggle{display:flex;gap:0;margin-bottom:36px;border:1px solid var(--line);width:fit-content}
.mode-btn{padding:10px 28px;font-family:'Jost',sans-serif;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;border:none;background:transparent;color:var(--mid);cursor:pointer;transition:all .2s}
.mode-btn:hover{color:var(--ink)}
.mode-btn.on{background:var(--ink);color:var(--white)}
.mode-divider{width:1px;background:var(--line)}

/* FORM */
label{display:block;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--mid);margin-bottom:8px}
textarea,input[type="text"],input[type="number"]{width:100%;background:var(--white);border:1px solid var(--line);color:var(--ink);padding:12px 14px;font-family:'Jost',sans-serif;font-size:13px;outline:none;transition:border .2s;resize:vertical;border-radius:0}
textarea:focus,input:focus{border-color:var(--ink)}
.field{margin-bottom:24px}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-bottom:24px}
@media(max-width:640px){.row2{grid-template-columns:1fr}}

/* CHIPS */
.chips{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:24px}
.chip{padding:6px 16px;border:1px solid var(--line);font-size:11px;letter-spacing:1px;text-transform:uppercase;cursor:pointer;transition:all .2s;color:var(--mid);background:transparent;font-family:'Jost',sans-serif}
.chip:hover{border-color:var(--ink);color:var(--ink)}.chip.on{background:var(--ink);color:var(--white);border-color:var(--ink)}

/* BUTTONS */
.btn{background:var(--ink);color:var(--white);border:none;padding:13px 32px;font-family:'Jost',sans-serif;font-size:11px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:opacity .2s}
.btn:hover{opacity:.75}.btn:disabled{opacity:.3;cursor:not-allowed}
.btn-ghost{background:transparent;color:var(--mid);border:1px solid var(--line);padding:7px 16px;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;font-family:'Jost',sans-serif;transition:all .2s}
.btn-ghost:hover{border-color:var(--ink);color:var(--ink)}

/* RESULT */
.result-box{margin-top:32px;background:var(--white);border:1px solid var(--line)}
.result-head{padding:14px 20px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between}
.result-tag{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--gold)}
.result-body{padding:24px;white-space:pre-wrap;line-height:1.8;font-size:13px;color:var(--ink)}

/* LOADING & ERROR */
.loading{display:flex;align-items:center;gap:12px;padding:20px 0;color:var(--mid);font-size:11px;letter-spacing:1.5px;text-transform:uppercase}
.dot{width:5px;height:5px;background:var(--ink);animation:p 1.2s infinite}
.dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
@keyframes p{0%,100%{opacity:.15}50%{opacity:1}}
.err{color:#8a3a3a;font-size:12px;padding:10px 14px;border:1px solid #dcc;background:#fdf8f8;margin-top:12px}

/* CALENDAR */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-top:24px}
@media(max-width:700px){.cal-grid{grid-template-columns:repeat(3,1fr)}}
.cal-head{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--mid);text-align:center;padding:8px 0;border-bottom:1px solid var(--line)}
.cal-card{background:var(--white);border:1px solid var(--line);padding:14px 10px;min-height:150px;font-size:11px;line-height:1.6;transition:border .2s;cursor:pointer}
.cal-card:hover{border-color:var(--ink)}
.cal-card.expanded{border-color:var(--ink)}
.cal-date{font-family:'Cormorant Garamond',serif;font-size:20px;color:var(--ink);margin-bottom:4px}
.cal-type{font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--gold);margin-bottom:6px}
.cal-empty{background:var(--bg);border:1px solid var(--line);min-height:150px}
.cal-caption{margin-top:8px;font-size:11px;color:var(--ink);line-height:1.6;padding-top:8px;border-top:1px solid var(--line)}
.cal-expand-hint{font-size:9px;letter-spacing:1px;text-transform:uppercase;color:var(--gold);margin-top:8px}

/* DROP ZONE */
.drop{border:1px solid var(--line);padding:40px;text-align:center;cursor:pointer;transition:all .2s;background:var(--white);margin-bottom:24px}
.drop:hover,.drop.over{border-color:var(--ink)}
.drop-txt strong{display:block;font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:400;color:var(--ink);margin-bottom:6px}
.drop-txt{color:var(--mid);font-size:12px}
.preview{max-width:100%;max-height:260px;object-fit:contain}

/* IMAGE GRID */
.img-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px;margin:14px 0}
.img-card{background:var(--white);border:1px solid var(--line);overflow:hidden;position:relative;transition:border .2s}
.img-card:hover{border-color:var(--mid)}
.img-thumb{width:100%;aspect-ratio:1;object-fit:cover;display:block}
.img-name{padding:7px 9px;font-size:10px;color:var(--mid);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.img-rm{position:absolute;top:5px;right:5px;width:20px;height:20px;background:var(--white);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;font-size:10px;cursor:pointer;opacity:0;transition:opacity .2s}
.img-card:hover .img-rm{opacity:1}
.num-badge{position:absolute;top:5px;left:5px;background:rgba(26,25,22,.65);color:#fff;padding:2px 7px;font-size:10px}
.order-badge{position:absolute;top:5px;left:5px;background:var(--ink);color:#fff;width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500}

/* DIVIDER */
.divider{border:none;border-top:1px solid var(--line);margin:32px 0}

/* IMAGE ANALYSIS TABLE */
.img-table{width:100%;border-collapse:collapse;margin-top:32px}
.img-table th{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--mid);font-weight:400;padding:10px 16px;border-bottom:1px solid var(--line);text-align:left;background:var(--white)}
.img-table th:first-child{width:110px}
.img-table td{padding:20px 16px;border-bottom:1px solid var(--line);vertical-align:top;font-size:13px;line-height:1.7;color:var(--ink);background:var(--white)}
.img-table tr:last-child td{border-bottom:none}
.img-table tr:hover td{background:#faf9f7}
.img-table .thumb-cell{padding:16px}
.img-table .thumb{width:80px;height:80px;object-fit:cover;display:block;border:1px solid var(--line)}
.img-table .caption-variants{display:flex;flex-direction:column;gap:12px}
.img-table .variant{background:var(--bg);padding:12px 14px;border-left:2px solid var(--line)}
.img-table .variant-label{font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--gold);margin-bottom:4px}
.img-table .variant-text{font-size:12px;line-height:1.7;color:var(--ink)}
.img-table .copy-cell{width:60px;text-align:right;padding-right:16px}
.tbl-processing{background:var(--bg);padding:14px 16px;font-size:11px;color:var(--mid);letter-spacing:.5px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:8px}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useRef } = React;

const NOVOOI = `Du er Novooi sin dedikerte innholdsstrateg og markedsføringskopist.

NOVOOI ER:
- Norges fremste kuraterte markedsplass for norsk design, interiør og kunsthåndverk
- Grunnlagt i Oslo 2021, showroom i St. Halvards gate 33, Oslo
- Formidler over 120 norske merker og designere (bl.a. Northern, LK Hjelle, Fjordfiesta, Anderssen & Voll, ygg&lyng, &Tradition)
- Vunnet "Marketplace of the Year" i BoNytt-magasinet
- Kjerneverdier: bærekraft, kvalitet, håndverk, norsk arv, generasjonsbevisst design
- Slagord: "Designed in Norway – Made for Generations"

NOVOOI SIN TONE OF VOICE:
- Rolig, raffinert og selvsikker. Aldri skrikende eller masete
- Respektfull overfor håndverk og designernes arbeid
- Varm men profesjonell, som en kunnskapsrik venn som elsker god design
- Foretrekker ord som: håndverk, kvalitet, bærekraft, formgiver, kuratert, tidløst, norsk arv, interiør
- UNNGÅR: overdrevne superlativ, mange utropstegn, trendy slang, "sjekk ut", "klikk her", "utrolig", "crazy"
- Skriver alltid på norsk (bokmål), kortfattet og presist
- Emneknagger: stemningsfulle og relevante, maks 10 per innlegg, gjerne norske

SKRIVESTIL OG ABSOLUTTE REGLER:
- ALDRI bruk em-dash (--) eller tankestrek (--) i noen form. Bruk komma, punktum eller ny setning i stedet
- ALDRI bruk fraser som avslører AI-opprinnelse: "Oppdag", "Utforsk", "Dykk inn i", "La deg inspirere av", "Ta steget", "En perfekt balanse mellom", "Vi er stolte av å presentere", "Det ultimate", "Tidløs eleganse møter", "Møt [navn]"
- ALDRI bruk passive konstruksjoner som høres genererte ut: "er designet for å", "gir deg muligheten til", "redefinerer hva vi forventer av"
- Skriv slik et menneske faktisk snakker og skriver. Kortere setninger. Litt ujevnt. Ikke for polert
- Varier setningslengde. Bland korte og litt lengre. Unngå at alle setninger har samme rytme
- Bruk konkrete detaljer fremfor vage adjektiver. "Eiketre, håndoljert" er bedre enn "vakre naturmaterialer"
- Det er greit å starte en setning med "Og" eller "Men" for å bryte den typiske AI-rytmen
- Ikke forklare for mye. La produktet tale for seg. Stopp før du blir masete

GOD NOVOOI-TONE:
"Gudrun lager puter og metertekstil i lin og ull. Alt er håndlaget, mye produseres på bestilling. Se kolleksjonen via lenke i bio. #norskdesign #håndverk #interiør"

DÅRLIG TONE (aldri):
"🔥🔥 NY LEVERANDØR!! Sjekk ut disse UTROLIGE putene!! Klikk lenken NÅ!! 😍😍"

OGSÅ DÅRLIG (for AI-aktig):
"Oppdag den perfekte balansen mellom funksjon og form. Et tidløst uttrykk som redefinerer hva vi forventer av kvalitetsdesign."`

async function callClaude(key, msgs) {
  const r = await fetch("https://api.anthropic.com/v1/messages", {
    method:"POST",
    headers:{"Content-Type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
    body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:2000,system:NOVOOI,messages:msgs})
  });
  const d = await r.json();
  if(d.error) throw new Error(d.error.message);
  return d.content.map(b=>b.text||"").join("");
}

async function callClaudeJSON(key, msgs) {
  const r = await fetch("https://api.anthropic.com/v1/messages", {
    method:"POST",
    headers:{"Content-Type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
    body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:2000,system:NOVOOI+"\n\nVIKTIG: Returner KUN gyldig JSON, ingen backticks, ingen annen tekst.",messages:msgs})
  });
  const d = await r.json();
  if(d.error) throw new Error(d.error.message);
  return d.content.map(b=>b.text||"").join("");
}

function CopyBtn({text}){
  const [c,setC]=useState(false);
  return <button className="btn-ghost" onClick={()=>{navigator.clipboard.writeText(text);setC(true);setTimeout(()=>setC(false),1500)}}>{c?"Kopiert ✓":"Kopier"}</button>;
}

const TONES=["Profesjonell","Uformell","Inspirerende","Eksklusivt"];
const PLAT=["Instagram","Facebook","LinkedIn","TikTok"];
const DAYS=["Man","Tir","Ons","Tor","Fre","Lør","Søn"];

/* ══════════════════════════════════════════
   INNHOLD-FANE: caption + ukeplan i én
══════════════════════════════════════════ */
function InnholdTab({k, state, setState}){
  const {mode, topic, tone, plat, extra, res,
         focus, posts, cal, raw, load, err, expandedDay} = state;
  const set = (key,val) => setState(s=>({...s,[key]:val}));

  /* ── Enkelt innlegg ── */
  const genCaption = async () => {
    if(!topic.trim()){set("err","Beskriv innlegget.");return;}
    set("err","");set("load",true);set("res","");
    try{
      const r = await callClaude(k,[{role:"user",content:
        `Lag 3 caption-varianter til ${plat} for Novooi.\nTema: ${topic}\nØnsket tone: ${tone}\n${extra?`Tillegg: ${extra}`:""}\n\nMerk VARIANT 1, VARIANT 2, VARIANT 3 tydelig. Husk Novooi sin tone of voice og inkluder passende emneknagger.`
      }]);
      set("res",r);
    }catch(e){set("err",e.message);}
    set("load",false);
  };

  /* ── Ukeplan ── */
  const genCalendar = async () => {
    set("err","");set("load",true);set("cal",null);set("raw","");
    try{
      const r = await callClaudeJSON(k,[{role:"user",content:
        `Lag ukentlig innleggskalender for Novooi på ${plat}.\n${focus?`Ukens tema/leverandør: ${focus}\n`:""}Antall innlegg: ${posts}.\n\nFor hvert innlegg: inkluder et ferdig caption-forslag i Novooi sin tone (ikke bare en idé — en faktisk ferdig caption med emneknagger).\n\nReturner KUN JSON:\n{"innlegg":[{"dag":"Man","dato":1,"type":"Post","tema":"...","caption":"Ferdig caption-tekst her med emneknagger...","tidspunkt":"09:00"}]}`
      }]);
      set("raw",r);
      const clean=r.replace(/```json|```/g,"").trim();
      set("cal",JSON.parse(clean).innlegg||[]);
    }catch(e){set("err","Parse-feil – prøv igjen. "+e.message);}
    set("load",false);
  };

  const byDay = cal ? DAYS.reduce((a,d)=>{a[d]=cal.find(p=>p.dag===d);return a},{}) : {};

  return <div>
    <p className="page-title">Innhold</p>
    <p className="page-sub">Lag enkelt innlegg eller planlegg hele uken — begge i Novooi sin tone</p>

    {/* MODE TOGGLE */}
    <div className="mode-toggle">
      <button className={`mode-btn${mode==="single"?" on":""}`} onClick={()=>set("mode","single")}>Enkelt innlegg</button>
      <div className="mode-divider"/>
      <button className={`mode-btn${mode==="week"?" on":""}`} onClick={()=>set("mode","week")}>Ukeplan</button>
    </div>

    {/* ── ENKELT INNLEGG ── */}
    {mode==="single" && <>
      <label>Plattform</label>
      <div className="chips">{PLAT.map(p=><button key={p} className={`chip${plat===p?" on":""}`} onClick={()=>set("plat",p)}>{p}</button>)}</div>

      <div className="field"><label>Beskriv innlegget</label>
        <textarea rows={3} placeholder="F.eks: Vi lanserer ny leverandør Gudrun — håndlagde puter og metertekstil i naturfibre..." value={topic} onChange={e=>set("topic",e.target.value)}/>
      </div>

      <label>Tone</label>
      <div className="chips">{TONES.map(t=><button key={t} className={`chip${tone===t?" on":""}`} onClick={()=>set("tone",t)}>{t}</button>)}</div>

      <div className="field"><label>Tilleggsinfo (valgfritt)</label>
        <textarea rows={2} placeholder="CTA, rabattkode, lenke i bio, relevant kontekst..." value={extra} onChange={e=>set("extra",e.target.value)}/>
      </div>

      <button className="btn" onClick={genCaption} disabled={load}>{load?"Genererer…":"Generer captions"}</button>
      {err && <p className="err">{err}</p>}
      {load && <div className="loading"><div className="dot"/><div className="dot"/><div className="dot"/>Skriver Novooi-captions</div>}
      {res && <div className="result-box">
        <div className="result-head"><span className="result-tag">Dine caption-varianter</span><CopyBtn text={res}/></div>
        <div className="result-body">{res}</div>
      </div>}
    </>}

    {/* ── UKEPLAN ── */}
    {mode==="week" && <>
      <div className="row2">
        <div className="field"><label>Ukens tema / leverandør (valgfritt)</label>
          <textarea rows={3} placeholder="F.eks: Ny leverandør Gudrun (puter og metertekstil), Håndverksbiennalen, vårkollesjonen fra Northern..." value={focus} onChange={e=>set("focus",e.target.value)}/>
        </div>
        <div>
          <div className="field"><label>Plattform</label>
            <div className="chips" style={{marginBottom:0}}>{PLAT.map(p=><button key={p} className={`chip${plat===p?" on":""}`} onClick={()=>set("plat",p)}>{p}</button>)}</div>
          </div>
          <div className="field" style={{marginTop:20}}><label>Antall innlegg</label>
            <input type="number" min="1" max="7" value={posts} onChange={e=>set("posts",e.target.value)}/>
          </div>
        </div>
      </div>

      <button className="btn" onClick={genCalendar} disabled={load}>{load?"Planlegger…":"Lag ukeplan med captions"}</button>
      {err && <p className="err">{err}</p>}
      {load && <div className="loading"><div className="dot"/><div className="dot"/><div className="dot"/>Lager Novooi-ukeplan med ferdige captions</div>}

      {cal && <>
        <div style={{marginTop:32,marginBottom:12,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <label style={{margin:0}}>Klikk på en dag for å se ferdig caption</label>
          <CopyBtn text={cal.filter(p=>p.caption).map(p=>`${p.dag} — ${p.tema}\n${p.caption}`).join("\n\n")}/>
        </div>
        <div className="cal-grid">
          {DAYS.map(d=><div key={d} className="cal-head">{d}</div>)}
          {DAYS.map(d=>{
            const p=byDay[d];
            const isExpanded = expandedDay===d;
            return p
              ? <div key={d} className={`cal-card${isExpanded?" expanded":""}`} onClick={()=>set("expandedDay",isExpanded?null:d)}>
                  <div className="cal-date">{p.dato||""}</div>
                  <div className="cal-type">{p.type}</div>
                  <div style={{fontWeight:500,color:"var(--ink)",fontSize:11,marginBottom:4}}>{p.tema}</div>
                  {p.tidspunkt && <div style={{fontSize:10,color:"var(--gold)",marginBottom:4}}>{p.tidspunkt}</div>}
                  {!isExpanded && p.caption && <div className="cal-expand-hint">Trykk for caption ↓</div>}
                  {isExpanded && p.caption && <div className="cal-caption">{p.caption}</div>}
                </div>
              : <div key={d} className="cal-empty"/>;
          })}
        </div>

        {/* Full liste med alle captions */}
        <hr className="divider"/>
        <label style={{marginBottom:16,display:"block"}}>Alle captions denne uken</label>
        {cal.filter(p=>p.caption).map((p,i)=>(
          <div key={i} className="result-box" style={{marginTop:i===0?0:16}}>
            <div className="result-head">
              <span className="result-tag">{p.dag} — {p.tema}</span>
              <CopyBtn text={p.caption}/>
            </div>
            <div className="result-body">{p.caption}</div>

  </div>;
}

/* ══════════════════════════════════════════
   BILDEANALYSE — flere bilder, tabell
══════════════════════════════════════════ */
function parseVariants(text){
  // Extract VARIANT 1/2/3 blocks from Claude response
  const variants = [];
  const re = /VARIANT\s*\d+[:\s]+([\s\S]*?)(?=VARIANT\s*\d+|$)/gi;
  let m;
  while((m=re.exec(text))!==null){
    const v = m[1].trim();
    if(v) variants.push(v);
  }
  // fallback: split on double newline if no variants found
  if(variants.length===0) return [text.trim()];
  return variants.slice(0,3);
}

function ImageTab({k, state, setState}){
  const {imgs, plat, tone, results, over, globalLoad, err} = state;
  const set = (key,val) => setState(s=>({...s,[key]:val}));
  const ref = useRef();

  const loadFiles = files => {
    Array.from(files).forEach(f=>{
      if(!f.type.startsWith("image/")) return;
      const reader=new FileReader();
      reader.onload=e=>setState(s=>({
        ...s,
        imgs:[...s.imgs,{name:f.name,mime:f.type,data:e.target.result.split(",")[1],url:e.target.result,status:"pending",variants:[]}]
      }));
      reader.readAsDataURL(f);
    });
    set("err","");
  };

  const analyzeOne = async (img, index, key, plat, tone) => {
    setState(s=>{
      const imgs=[...s.imgs];
      imgs[index]={...imgs[index],status:"loading"};
      return {...s,imgs};
    });
    try{
      const r=await callClaude(key,[{role:"user",content:[
        {type:"image",source:{type:"base64",media_type:img.mime,data:img.data}},
        {type:"text",text:`Analyser bildet og lag 3 ${plat}-captions for Novooi med tone: ${tone}.\nSkriv en KORT bildebeskrivelse (1 setning), deretter:\nVARIANT 1: [ferdig caption med emneknagger]\nVARIANT 2: [ferdig caption med emneknagger]\nVARIANT 3: [ferdig caption med emneknagger]\nHusk Novooi sin tone of voice.`}
      ]}]);
      // split description from variants
      const descMatch = r.match(/^([^\n]+)\n/);
      const desc = descMatch ? descMatch[1].trim() : "";
      const variants = parseVariants(r);
      setState(s=>{
        const imgs=[...s.imgs];
        imgs[index]={...imgs[index],status:"done",desc,variants};
        return {...s,imgs};
      });
    } catch(e){
      setState(s=>{
        const imgs=[...s.imgs];
        imgs[index]={...imgs[index],status:"error",error:e.message};
        return {...s,imgs};
      });
    }
  };

  const go = async () => {
    if(imgs.length===0){set("err","Last opp minst ett bilde.");return;}
    set("err",""); set("globalLoad",true);
    // Analyze sequentially to avoid rate limits
    for(let i=0;i<imgs.length;i++){
      if(imgs[i].status!=="done") await analyzeOne(imgs[i],i,k,plat,tone);
    }
    set("globalLoad",false);
  };

  const allDone = imgs.length>0 && imgs.every(i=>i.status==="done"||i.status==="error");
  const allCopy = imgs.filter(i=>i.variants&&i.variants.length).map(i=>
    `${i.name}\n${i.desc||""}\n\n${i.variants.map((v,j)=>`Variant ${j+1}:\n${v}`).join("\n\n")}`
  ).join("\n\n---\n\n");

  return <div>
    <p className="page-title">Bildeanalyse</p>
    <p className="page-sub">Last opp flere bilder — agenten lager 3 caption-varianter per bilde i en oversiktlig tabell</p>

    <div className={`drop${over?" over":""}`} style={{minHeight:100}}
      onDragOver={e=>{e.preventDefault();set("over",true);}}
      onDragLeave={()=>set("over",false)}
      onDrop={e=>{e.preventDefault();set("over",false);loadFiles(e.dataTransfer.files);}}
      onClick={()=>ref.current.click()}>
      <div className="drop-txt"><strong>Dra bilder hit</strong>Velg ett eller flere bilder — hold ⌘ / Ctrl for flere</div>
      <input ref={ref} type="file" accept="image/*" multiple style={{display:"none"}} onChange={e=>loadFiles(e.target.files)}/>
    </div>

    {imgs.length>0 && <>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16}}>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          <div className="chips" style={{marginBottom:0}}>
            {PLAT.map(p=><button key={p} className={`chip${plat===p?" on":""}`} onClick={()=>set("plat",p)}>{p}</button>)}
          </div>
          <div style={{width:1,height:24,background:"var(--line)",margin:"0 4px"}}/>
          <div className="chips" style={{marginBottom:0}}>
            {TONES.map(t=><button key={t} className={`chip${tone===t?" on":""}`} onClick={()=>set("tone",t)}>{t}</button>)}
          </div>
        </div>
        <button className="btn-ghost" onClick={()=>setState(s=>({...s,imgs:[],globalLoad:false,err:""}))}>Fjern alle</button>
      </div>

      <div style={{display:"flex",gap:10,alignItems:"center",marginBottom:24}}>
        <button className="btn" onClick={go} disabled={globalLoad}>{globalLoad?"Analyserer…":`Analyser ${imgs.length} bilde${imgs.length>1?"r":""}`}</button>
        {allDone && <CopyBtn text={allCopy}/>}
      </div>
    </>}

    {err&&<p className="err">{err}</p>}

    {imgs.length>0 && (imgs.some(i=>i.status!=="pending") || allDone) && (
      <table className="img-table">
        <thead>
          <tr>
            <th>Bilde</th>
            <th>Beskrivelse</th>
            <th>Caption-varianter</th>
            <th></th>
          </tr>
        </thead>
        <tbody>
          {imgs.map((img,i)=>(
            <tr key={i}>
              <td className="thumb-cell">
                <img className="thumb" src={img.url} alt={img.name}/>
                <div style={{fontSize:9,color:"var(--mid)",marginTop:6,wordBreak:"break-all",letterSpacing:".3px"}}>{img.name}</div>
              </td>
              <td style={{minWidth:120,maxWidth:160}}>
                {img.status==="loading" && <div className="loading" style={{padding:0}}><div className="dot"/><div className="dot"/><div className="dot"/></div>}
                {img.status==="error" && <span style={{color:"#8a3a3a",fontSize:12}}>{img.error}</span>}
                {img.status==="done" && <span style={{fontSize:12,color:"var(--mid)",lineHeight:1.6}}>{img.desc}</span>}
                {img.status==="pending" && <span style={{fontSize:11,color:"var(--mid)",letterSpacing:".5px"}}>Venter…</span>}
              </td>
              <td>
                {img.status==="done" && img.variants.length>0 && (
                  <div className="caption-variants">
                    {img.variants.map((v,j)=>(
                      <div key={j} className="variant">
                        <div className="variant-label">Variant {j+1}</div>
                        <div className="variant-text">{v}</div>
                      </div>
                    ))}
                  </div>
                )}
              </td>
              <td className="copy-cell">
                {img.status==="done" && img.variants.length>0 &&
                  <CopyBtn text={img.variants.join("\n\n---\n\n")}/>
                }
              </td>
            </tr>
          ))}
        </tbody>
      </table>
    )}
  </div>;
}

/* ══════════════════════════════════════════
   BILDERREKKEFØLGE
══════════════════════════════════════════ */
function OrderTab({k, state, setState}){
  const {imgs, plat, goal, res, load, err, over, order} = state;
  const set = (key,val) => setState(s=>({...s,[key]:val}));
  const ref = useRef();

  const loadFiles = files => {
    Array.from(files).forEach(f=>{
      if(!f.type.startsWith("image/")) return;
      const reader=new FileReader();
      reader.onload=e=>setState(s=>({...s,imgs:[...s.imgs,{name:f.name,mime:f.type,data:e.target.result.split(",")[1],url:e.target.result}]}));
      reader.readAsDataURL(f);
    });
  };

  const go = async () => {
    if(imgs.length<2){set("err","Last opp minst 2 bilder.");return;}
    set("err","");set("load",true);set("res","");set("order",[]);
    try{
      const content=[];
      imgs.forEach((img,i)=>{
        content.push({type:"text",text:`BILDE ${i+1}: "${img.name}"`});
        content.push({type:"image",source:{type:"base64",media_type:img.mime,data:img.data}});
      });
      content.push({type:"text",text:`Du har sett ${imgs.length} bilder fra Novooi sin bildebank.\nPlattform: ${plat}${goal?`\nKampanjemål: ${goal}`:""}\n\nGi:\n1. Kort beskrivelse av hvert bilde (Bilde 1, 2 osv.)\n2. Anbefalt publiseringsrekkefølge. Skriv NØYAKTIG slik: "Anbefalt rekkefølge: X, X, X"\n3. Begrunnelse (visuell flyt, storytelling, Novooi-estetikk)\n4. Caption-ide for hvert bilde i rekkefølgen\n\nSkriv på norsk i Novooi sin tone.`});
      const r=await callClaude(k,[{role:"user",content}]);
      set("res",r);
      const m=r.match(/[Aa]nbefalt\s+rekkef[ø|o]lge:\s*([0-9,\s]+)/);
      if(m){
        const nums=m[1].split(/[,\s]+/).map(n=>parseInt(n.trim())-1).filter(n=>!isNaN(n)&&n>=0&&n<imgs.length);
        if(nums.length>0) set("order",nums);
      }
    }catch(e){set("err",e.message);}
    set("load",false);
  };

  const orderedImgs = order.length>0 ? order.map(i=>imgs[i]).filter(Boolean) : [];

  return <div>
    <p className="page-title">Bilderrekkefølge</p>
    <p className="page-sub">Last opp bilder fra mappen din — agenten foreslår optimal publiseringsrekkefølge</p>
    <div className={`drop${over?" over":""}`} style={{minHeight:110}}
      onDragOver={e=>{e.preventDefault();set("over",true);}}
      onDragLeave={()=>set("over",false)}
      onDrop={e=>{e.preventDefault();set("over",false);loadFiles(e.dataTransfer.files);}}
      onClick={()=>ref.current.click()}>
      <div className="drop-txt"><strong>Dra bilder hit</strong>Hold ⌘ eller Ctrl for å velge flere filer</div>
      <input ref={ref} type="file" accept="image/*" multiple style={{display:"none"}} onChange={e=>loadFiles(e.target.files)}/>
    </div>
    {imgs.length>0 && <>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
        <label style={{margin:0}}>{imgs.length} bilder lastet opp</label>
        <button className="btn-ghost" onClick={()=>setState(s=>({...s,imgs:[],res:"",order:[]}))}>Fjern alle</button>
      </div>
      <div className="img-grid">
        {imgs.map((img,i)=><div key={i} className="img-card">
          <img className="img-thumb" src={img.url} alt={img.name}/>
          <div className="img-name">{img.name}</div>
          <div className="img-rm" onClick={()=>setState(s=>({...s,imgs:s.imgs.filter((_,idx)=>idx!==i)}))}>✕</div>
          <div className="num-badge">{i+1}</div>
        </div>)}
      </div>
    </>}
    <div className="row2" style={{marginTop:imgs.length>0?16:0}}>
      <div><label>Plattform</label><div className="chips" style={{marginBottom:0}}>{PLAT.map(p=><button key={p} className={`chip${plat===p?" on":""}`} onClick={()=>set("plat",p)}>{p}</button>)}</div></div>
      <div className="field"><label>Kampanjemål (valgfritt)</label><input type="text" placeholder="F.eks. ny leverandør, sesong, utstilling..." value={goal} onChange={e=>set("goal",e.target.value)}/></div>
    </div>
    <button className="btn" onClick={go} disabled={load||imgs.length<2}>{load?"Analyserer…":"Analyser rekkefølge"}</button>
    {err&&<p className="err">{err}</p>}
    {load&&<div className="loading"><div className="dot"/><div className="dot"/><div className="dot"/>Analyserer {imgs.length} bilder</div>}
    {res&&<>
      {orderedImgs.length>0&&<>
        <div style={{marginTop:32,marginBottom:10}}><label>Anbefalt rekkefølge</label></div>
        <div className="img-grid">
          {orderedImgs.map((img,pos)=><div key={pos} className="img-card">
            <img className="img-thumb" src={img.url} alt={img.name}/>
            <div className="img-name">{img.name}</div>
            <div className="order-badge">{pos+1}</div>
          </div>)}
        </div>
      </>}
      <div className="result-box" style={{marginTop:24}}>
        <div className="result-head"><span className="result-tag">Analyse og strategi</span><CopyBtn text={res}/></div>
        <div className="result-body">{res}</div>
      </div>
    </>}
  </div>;
}

/* ══════════════════════════════════════════
   LOCK SCREEN — validerer API-nøkkel live
══════════════════════════════════════════ */
async function validateKey(fullKey){
  const r = await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",
    headers:{"Content-Type":"application/json","x-api-key":fullKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
    body:JSON.stringify({model:"claude-haiku-4-5-20251001",max_tokens:5,messages:[{role:"user",content:"hi"}]})
  });
  const d = await r.json();
  if(d.error) throw new Error(d.error.message);
  return true;
}

function LockScreen({onUnlock}){
  const [suffix,setSuffix]=useState("");
  const [checking,setChecking]=useState(false);
  const [err,setErr]=useState("");

  const attempt = async () => {
    if(suffix.trim().length<1) return;
    setErr(""); setChecking(true);
    const fullKey = KEY_PREFIX + suffix.trim();
    try{
      await validateKey(fullKey);
      onUnlock(fullKey);
    } catch(e) {
      setErr("Feil tilgangskode — prøv igjen.");
      setSuffix("");
    }
    setChecking(false);
  };

  return <div className="lock">
    <div className="lock-box">
      <div className="lock-logo">markeds<em>agent</em></div>
      <div className="lock-sub">Novooi — Norsk design, interiør og kunsthåndverk</div>
      <span className="lock-label">Skriv inn tilgangskoden</span>
      <input className="lock-input" type="password" maxLength={4} placeholder="····"
        value={suffix} onChange={e=>{setSuffix(e.target.value);setErr("");}}
        onKeyDown={e=>e.key==="Enter"&&!checking&&attempt()}
        style={err?{borderBottomColor:"#8a3a3a"}:{}}
        autoFocus disabled={checking}/>
      {err && <p style={{fontSize:12,color:"#8a3a3a",marginBottom:16,letterSpacing:".3px"}}>{err}</p>}
      {checking
        ? <div className="loading" style={{justifyContent:"center",paddingTop:0,paddingBottom:0}}>
            <div className="dot"/><div className="dot"/><div className="dot"/>Verifiserer kode
          </div>
        : <button className="btn" style={{width:"100%"}} onClick={attempt}>Logg inn</button>
      }
    </div>
  </div>;
}

/* ══════════════════════════════════════════
   APP — all state lifted here
══════════════════════════════════════════ */
const INIT = {
  innhold:  { mode:"single", topic:"", tone:"Profesjonell", plat:"Instagram", extra:"", res:"",
              focus:"", posts:"5", cal:null, raw:"", load:false, err:"", expandedDay:null },
  image:    { imgs:[], plat:"Instagram", tone:"Profesjonell", over:false, globalLoad:false, err:"" },
  order:    { imgs:[], plat:"Instagram", goal:"", res:"", load:false, err:"", over:false, order:[] },
};

function App(){
  const [tab,setTab]=useState("innhold");
  const [key,setKey]=useState("");
  const [ts,setTs]=useState(INIT);
  const setS = id => fn => setTs(s=>({...s,[id]:fn(s[id])}));

  if(!key) return <LockScreen onUnlock={setKey}/>;

  return <div className="app">

      <div className="logo">markeds<em>agent</em></div>
      <div className="hdr-right">
        <span className="api-ok">● Novooi</span>
        <button className="btn-ghost" onClick={()=>setKey("")}>Logg ut</button>
      </div>
    </div>
    <div className="nav">
      {[["innhold","Innhold"],["image","Bildeanalyse"],["order","Bilderrekkefølge"]].map(([id,label])=>
        <button key={id} className={`tab${tab===id?" active":""}`} onClick={()=>setTab(id)}>{label}</button>
      )}
    </div>
    <div className="main">
      {tab==="innhold"  && <InnholdTab  k={key} state={ts.innhold} setState={setS("innhold")}/>}
      {tab==="image"    && <ImageTab    k={key} state={ts.image}   setState={setS("image")}/>}

}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
