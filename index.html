<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body,#root{min-height:100%;font-family:'Jost',sans-serif}

/* ── VARIABLES ── */
:root{
  --bg:#f8f6f3;--white:#fff;--ink:#1a1916;--mid:#7a7670;
  --line:#dedad4;--gold:#8a7a5a;--surface:#f2efe9;
  --red:#8a3a3a;--green:#3a6b4a;
}
body.dark{
  --bg:#111010;--white:#1c1b19;--ink:#f0ead6;--mid:#8a8278;
  --line:#2a2824;--gold:#c9a84c;--surface:#161514;
  --red:#e07070;--green:#6bcf8a;
}
body{background:var(--bg);color:var(--ink);transition:background .2s,color .2s}

/* ── LOCK ── */
.lock{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:9999}
.lock-box{background:var(--white);border:1px solid var(--line);padding:56px 48px;text-align:center;max-width:360px;width:90%}
.lock-logo{font-family:'Cormorant Garamond',serif;font-size:22px;letter-spacing:3px;text-transform:uppercase;color:var(--ink);margin-bottom:4px}
.lock-logo em{font-style:normal;color:var(--gold)}
.lock-sub{font-size:12px;color:var(--mid);margin-bottom:36px}
.lock-lbl{display:block;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--mid);margin-bottom:10px}
.lock-inp{width:100%;background:transparent;border:none;border-bottom:1px solid var(--line);color:var(--ink);padding:8px 0;font-family:'Cormorant Garamond',serif;font-size:28px;letter-spacing:8px;text-align:center;outline:none;transition:border .2s;margin-bottom:28px}
.lock-inp:focus{border-bottom-color:var(--ink)}

/* ── HEADER ── */
.header{background:var(--white);border-bottom:1px solid var(--line);padding:0 40px;display:flex;align-items:center;justify-content:space-between;height:60px;gap:12px;position:sticky;top:0;z-index:100}
.logo{font-family:'Cormorant Garamond',serif;font-size:19px;letter-spacing:3px;text-transform:uppercase;color:var(--ink)}
.logo em{font-style:normal;color:var(--gold)}
.hdr-right{display:flex;align-items:center;gap:10px}
.icon-btn{background:transparent;border:1px solid var(--line);color:var(--mid);width:32px;height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;transition:all .2s;flex-shrink:0}
.icon-btn:hover{border-color:var(--ink);color:var(--ink)}
.ctx-badge{font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--gold);white-space:nowrap}

/* ── NAV ── */
.nav{background:var(--white);border-bottom:1px solid var(--line);padding:0 40px;display:flex;overflow-x:auto;position:sticky;top:60px;z-index:99}
.tab{padding:14px 20px 12px;font-family:'Jost',sans-serif;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;border:none;background:transparent;color:var(--mid);border-bottom:1px solid transparent;cursor:pointer;transition:all .2s;transform:translateY(1px);white-space:nowrap}
.tab:hover{color:var(--ink)}.tab.active{color:var(--ink);border-bottom-color:var(--ink)}
.tab-hint{font-size:9px;color:var(--mid);margin-left:4px;opacity:.6}

/* ── CAMPAIGN BANNER ── */
.ctx-banner{background:var(--surface);border-bottom:1px solid var(--line);padding:8px 40px;display:flex;align-items:center;gap:10px;font-size:12px;color:var(--mid)}
.ctx-banner strong{color:var(--ink);font-weight:500}
.ctx-banner button{background:transparent;border:none;color:var(--mid);cursor:pointer;font-size:11px;letter-spacing:.5px;text-decoration:underline}

/* ── MAIN SPLIT LAYOUT ── */
.page{display:flex;gap:0;min-height:calc(100vh - 120px)}
.input-panel{width:420px;flex-shrink:0;padding:40px;border-right:1px solid var(--line)}
.output-panel{flex:1;min-width:0;padding:40px;overflow-y:auto}
@media(max-width:900px){.page{flex-direction:column}.input-panel{width:100%;border-right:none;border-bottom:1px solid var(--line);padding:24px 20px}.output-panel{padding:24px 20px}}
@media(max-width:600px){.header,.nav{padding:0 16px}.ctx-banner{padding:8px 16px}}

.page-title{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:300;letter-spacing:.5px;margin-bottom:4px;line-height:1.2}
.page-sub{font-size:12px;color:var(--mid);margin-bottom:28px}

/* ── FORM ── */
label{display:block;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--mid);margin-bottom:7px}
textarea,input[type="text"],input[type="number"]{width:100%;background:var(--white);border:1px solid var(--line);color:var(--ink);padding:10px 12px;font-family:'Jost',sans-serif;font-size:13px;outline:none;transition:border .2s;resize:vertical;border-radius:0}
textarea:focus,input:focus{border-color:var(--ink)}
.field{margin-bottom:20px}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px}

/* ── CHIPS ── */
.chips{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:20px}
.chip{padding:5px 13px;border:1px solid var(--line);font-size:10px;letter-spacing:1px;text-transform:uppercase;cursor:pointer;transition:all .2s;color:var(--mid);background:transparent;font-family:'Jost',sans-serif}
.chip:hover{border-color:var(--ink);color:var(--ink)}.chip.on{background:var(--ink);color:var(--bg);border-color:var(--ink)}

/* ── BUTTONS ── */
.btn{background:var(--ink);color:var(--bg);border:none;padding:12px 28px;font-family:'Jost',sans-serif;font-size:10px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:opacity .2s}
.btn:hover{opacity:.75}.btn:disabled{opacity:.3;cursor:not-allowed}
.btn-ghost{background:transparent;color:var(--mid);border:1px solid var(--line);padding:6px 14px;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;font-family:'Jost',sans-serif;transition:all .2s}
.btn-ghost:hover{border-color:var(--ink);color:var(--ink)}
.btn-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:16px}
.refine-btn{background:var(--surface);color:var(--mid);border:1px solid var(--line);padding:6px 12px;font-size:10px;letter-spacing:1px;text-transform:uppercase;cursor:pointer;font-family:'Jost',sans-serif;transition:all .2s}
.refine-btn:hover{background:var(--ink);color:var(--bg);border-color:var(--ink)}

/* ── MODE TOGGLE ── */
.mode-toggle{display:flex;gap:0;margin-bottom:24px;border:1px solid var(--line);width:100%}
.mode-btn{flex:1;padding:9px 0;font-family:'Jost',sans-serif;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;border:none;background:transparent;color:var(--mid);cursor:pointer;transition:all .2s;text-align:center}
.mode-btn.on{background:var(--ink);color:var(--bg)}
.mode-divider{width:1px;background:var(--line)}

/* ── PLATFORM GUIDE ── */
.plat-guide{background:var(--surface);border:1px solid var(--line);padding:12px 14px;margin-bottom:20px;font-size:11px;line-height:1.7;color:var(--mid)}
.plat-guide strong{color:var(--ink);font-size:10px;letter-spacing:1px;text-transform:uppercase;display:block;margin-bottom:4px}
.plat-guide .best-time{color:var(--gold);font-size:10px;margin-top:4px}

/* ── CHAR COUNTER ── */
.char-row{display:flex;justify-content:space-between;align-items:center;margin-top:4px;margin-bottom:16px}
.char-count{font-size:10px;letter-spacing:.5px}
.char-count.good{color:var(--green)}
.char-count.warn{color:var(--gold)}
.char-count.over{color:var(--red)}
.char-bar{height:2px;background:var(--line);border-radius:1px;margin-top:4px;overflow:hidden}
.char-bar-fill{height:100%;transition:width .3s,background .3s;border-radius:1px}

/* ── RESULT ── */
.result-box{background:var(--white);border:1px solid var(--line);margin-bottom:12px}
.result-head{padding:12px 16px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;gap:8px}
.result-tag{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--gold);flex-shrink:0}
.result-body{padding:20px;white-space:pre-wrap;line-height:1.8;font-size:13px;color:var(--ink)}
.result-body.streaming::after{content:'▍';animation:blink .8s infinite;color:var(--gold)}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

/* ── AB ── */
.ab-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
@media(max-width:700px){.ab-grid{grid-template-columns:1fr}}

/* ── HISTORY ── */
.history-section{margin-top:24px}
.history-title{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--mid);margin-bottom:8px;display:flex;align-items:center;justify-content:space-between}
.hist-item{border:1px solid var(--line);margin-bottom:6px;cursor:pointer;transition:border .2s}
.hist-item:hover{border-color:var(--mid)}
.hist-head{padding:8px 12px;display:flex;align-items:center;justify-content:space-between;font-size:11px;color:var(--mid)}
.hist-preview{font-size:11px;color:var(--mid);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:200px}
.hist-meta{font-size:9px;letter-spacing:.5px;color:var(--gold)}
.hist-body{padding:12px;font-size:12px;line-height:1.7;white-space:pre-wrap;color:var(--ink);border-top:1px solid var(--line)}

/* ── LOADING / ERR ── */
.loading{display:flex;align-items:center;gap:10px;padding:16px 0;color:var(--mid);font-size:10px;letter-spacing:1.5px;text-transform:uppercase}
.dot{width:5px;height:5px;background:var(--gold);border-radius:50%;animation:p 1.2s infinite}
.dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
@keyframes p{0%,100%{opacity:.15;transform:scale(.8)}50%{opacity:1;transform:scale(1)}}
.err{color:var(--red);font-size:11px;padding:10px 12px;border:1px solid;background:transparent;margin-top:10px}

/* ── TOAST ── */
.toast-wrap{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);z-index:9000;pointer-events:none}
.toast{background:var(--ink);color:var(--bg);padding:9px 20px;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;opacity:0;transform:translateY(12px);transition:all .25s;white-space:nowrap}
.toast.show{opacity:1;transform:translateY(0)}

/* ── DROP ── */
.drop{border:1px solid var(--line);padding:32px;text-align:center;cursor:pointer;transition:all .2s;background:var(--white);margin-bottom:20px}
.drop:hover,.drop.over{border-color:var(--ink)}
.drop-txt strong{display:block;font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:400;color:var(--ink);margin-bottom:4px}
.drop-txt{color:var(--mid);font-size:11px}
.preview{max-width:100%;max-height:240px;object-fit:contain}

/* ── CALENDAR ── */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;margin-top:20px}
@media(max-width:700px){.cal-grid{grid-template-columns:repeat(3,1fr)}}
.cal-head{font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--mid);text-align:center;padding:6px 0;border-bottom:1px solid var(--line)}
.cal-card{background:var(--white);border:1px solid var(--line);padding:12px 8px;min-height:140px;font-size:10px;line-height:1.6;transition:border .2s;cursor:pointer}
.cal-card:hover,.cal-card.exp{border-color:var(--ink)}
.cal-date{font-family:'Cormorant Garamond',serif;font-size:18px;color:var(--ink);margin-bottom:3px}
.cal-type{font-size:8px;letter-spacing:1.5px;text-transform:uppercase;color:var(--gold);margin-bottom:4px}
.cal-time{font-size:9px;color:var(--gold);margin-top:4px}
.cal-caption{margin-top:8px;font-size:10px;color:var(--ink);line-height:1.6;padding-top:8px;border-top:1px solid var(--line);white-space:pre-wrap}
.cal-empty{background:var(--bg);border:1px solid var(--line);min-height:140px}

/* ── IMAGE TABLE ── */
.img-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:8px;margin:12px 0}
.img-card{background:var(--white);border:1px solid var(--line);overflow:hidden;position:relative;transition:border .2s}
.img-card:hover{border-color:var(--mid)}
.img-thumb{width:100%;aspect-ratio:1;object-fit:cover;display:block}
.img-name{padding:6px 8px;font-size:9px;color:var(--mid);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.img-rm{position:absolute;top:4px;right:4px;width:18px;height:18px;background:var(--white);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;font-size:9px;cursor:pointer;opacity:0;transition:opacity .2s}
.img-card:hover .img-rm{opacity:1}
.num-badge{position:absolute;top:4px;left:4px;background:rgba(26,25,22,.65);color:#fff;padding:2px 6px;font-size:9px}
.order-badge{position:absolute;top:4px;left:4px;background:var(--ink);color:var(--bg);width:20px;height:20px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:500}
.img-tbl{width:100%;border-collapse:collapse;margin-top:24px}
.img-tbl th{font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--mid);font-weight:400;padding:8px 14px;border-bottom:1px solid var(--line);text-align:left;background:var(--white)}
.img-tbl td{padding:16px 14px;border-bottom:1px solid var(--line);vertical-align:top;background:var(--white)}
.img-tbl tr:last-child td{border-bottom:none}
.img-tbl tr:hover td{background:var(--surface)}
.tbl-thumb{width:72px;height:72px;object-fit:cover;border:1px solid var(--line)}
.variant-block{background:var(--bg);padding:10px 12px;border-left:2px solid var(--line);margin-bottom:8px}
.variant-block:last-child{margin-bottom:0}
.variant-lbl{font-size:8px;letter-spacing:1.5px;text-transform:uppercase;color:var(--gold);margin-bottom:4px}
.variant-txt{font-size:11px;line-height:1.7;color:var(--ink)}

/* ── SETTINGS PANEL ── */
.settings-overlay{position:fixed;inset:0;background:rgba(26,25,22,.5);z-index:500;display:flex;justify-content:flex-end}
.settings-panel{background:var(--white);width:360px;height:100%;overflow-y:auto;padding:32px 28px;border-left:1px solid var(--line)}
.settings-title{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:300;margin-bottom:24px;display:flex;align-items:center;justify-content:space-between}
.settings-section{margin-bottom:28px}
.settings-section h3{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--mid);margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--line)}

/* ── ANALYSE TAB ── */
.score-ring{display:inline-flex;align-items:center;justify-content:center;width:64px;height:64px;border-radius:50%;border:2px solid var(--gold);font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:300;color:var(--gold);margin-right:16px}
.score-row{display:flex;align-items:center;margin-bottom:20px}

/* ── SEASON CALENDAR ── */
.season-list{display:flex;flex-direction:column;gap:6px}
.season-item{display:flex;gap:12px;align-items:flex-start;font-size:11px}
.season-date{font-size:10px;color:var(--gold);width:60px;flex-shrink:0;letter-spacing:.3px}
.season-event{color:var(--ink);line-height:1.5}

.divider{border:none;border-top:1px solid var(--line);margin:24px 0}
.kbd{background:var(--surface);border:1px solid var(--line);padding:1px 6px;font-size:10px;border-radius:2px;font-family:'Jost',sans-serif}
</style>
</head>

/* ══ API ══ */
async function streamClaude(key, msgs, onChunk, onDone, onError, extraSystem) {
  let resp;
  const sys = extraSystem ? NOVOOI + "\n\n" + extraSystem : NOVOOI;
  try {
    resp = await fetch("https://api.anthropic.com/v1/messages", {
      method:"POST",
      headers:{"Content-Type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
      body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:2000,stream:true,system:sys,messages:msgs})
    });
  } catch(e){ onError(e.message); return; }
  if(!resp.ok){ try{ const d=await resp.json(); onError(d.error?.message||"API-feil"); }catch(e){ onError("API-feil "+resp.status); } return; }
  const reader=resp.body.getReader(), dec=new TextDecoder();
  let buf="";
  try{
    while(true){
      const {done,value}=await reader.read();
      if(done) break;
      buf+=dec.decode(value,{stream:true});
      const lines=buf.split("\n"); buf=lines.pop()||"";
      for(const line of lines){
        if(!line.startsWith("data: ")) continue;
        const raw=line.slice(6).trim();
        if(!raw||raw==="[DONE]") continue;
        try{
          const evt=JSON.parse(raw);
          if(evt.type==="content_block_delta"&&evt.delta?.type==="text_delta") onChunk(evt.delta.text);
          if(evt.type==="message_stop"){ onDone(); return; }
        }catch(e){}
      }
    }
  }catch(e){ onError(e.message); return; }
  onDone();
}

async function callClaudeJSON(key, msgs) {
  const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:2000,system:NOVOOI+"\n\nReturner KUN gyldig JSON, ingen backticks, ingen annen tekst.",messages:msgs})});
  const d=await r.json(); if(d.error) throw new Error(d.error.message);
  return d.content.map(b=>b.text||"").join("");
}

}

function useToast(){
  const [state,setState]=useState({msg:"",show:false});
  const fire=useCallback(msg=>{ setState({msg,show:true}); setTimeout(()=>setState(s=>({...s,show:false})),2000); },[]);

function saveHist(tab,item){
  try{ const h=JSON.parse(localStorage.getItem("nv_hist_"+tab)||"[]"); h.unshift(item); localStorage.setItem("nv_hist_"+tab,JSON.stringify(h.slice(0,5))); }catch(e){}
}
function getHist(tab){ try{ return JSON.parse(localStorage.getItem("nv_hist_"+tab)||"[]"); }catch(e){ return []; } }

function charInfo(text,plat){
  const len=text.length, g=PLAT_GUIDE[plat]||PLAT_GUIDE.Instagram;
  const pct=Math.min(len/g.max*100,100);
  const cls=len<g.ideal[0]?"warn":len<=g.ideal[1]?"good":len<=g.max?"warn":"over";
  return {len,max:g.max,ideal:g.ideal,pct,cls};
}

/* ══ BILDEANALYSE TAB ══ */
function parseVariants(text){
  const variants=[]; const re=/VARIANT\s*\d+[:\s]+([\s\S]*?)(?=VARIANT\s*\d+|$)/gi; let m;
  while((m=re.exec(text))!==null){ const v=m[1].trim(); if(v) variants.push(v); }
  return variants.length>0?variants.slice(0,3):[text.trim()];
}

function ImageTab({k,state,setState,showToast}){

  const ref=useRef();

  const loadFiles=files=>{
    Array.from(files).forEach(f=>{
      if(!f.type.startsWith("image/")) return;
      const r=new FileReader();
      r.onload=e=>setState(s=>({...s,imgs:[...s.imgs,{name:f.name,mime:f.type,data:e.target.result.split(",")[1],url:e.target.result,status:"pending",variants:[],desc:""}]}));
      r.readAsDataURL(f);
    });
    set("err","");
  };

  const analyzeOne=async(img,index)=>{
    setState(s=>{const a=[...s.imgs];a[index]={...a[index],status:"loading"};return {...s,imgs:a};});
    try{
      const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","x-api-key":k,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1500,system:NOVOOI,messages:[{role:"user",content:[{type:"image",source:{type:"base64",media_type:img.mime,data:img.data}},{type:"text",text:`Analyser bildet og lag 3 ${plat}-captions for Novooi med tone: ${tone}.\nSkriv KORT bildebeskrivelse (1 setning), deretter:\nVARIANT 1: [caption med emneknagger]\nVARIANT 2: [caption med emneknagger]\nVARIANT 3: [caption med emneknagger]\nIngen em-dash, ikke AI-aktig.`}]}]})});
      const d=await r.json(); if(d.error) throw new Error(d.error.message);
      const text=d.content.map(b=>b.text||"").join("");
      const descMatch=text.match(/^([^\n]+)\n/); const desc=descMatch?descMatch[1].trim():"";
      const variants=parseVariants(text);
      setState(s=>{const a=[...s.imgs];a[index]={...a[index],status:"done",desc,variants};return {...s,imgs:a};});
    }catch(e){
      setState(s=>{const a=[...s.imgs];a[index]={...a[index],status:"error",error:e.message};return {...s,imgs:a};});

        <div className="drop-txt"><strong>Dra bilder hit</strong>Hold ⌘ / Ctrl for å velge flere</div>

        <div className="img-grid">

          <td style={{minWidth:120,maxWidth:160,fontSize:11,color:"var(--mid)",lineHeight:1.6}}>
            {img.status==="loading"&&<div className="loading" style={{padding:0}}><div className="dot"/><div className="dot"/><div className="dot"/></div>}
            {img.status==="error"&&<span style={{color:"var(--red)",fontSize:11}}>{img.error}</span>}
            {img.status==="done"&&img.desc}
            {img.status==="pending"&&<span style={{color:"var(--mid)",fontSize:10}}>Venter…</span>}
          </td>
          <td>{img.status==="done"&&<div>{img.variants.map((v,j)=><div key={j} className="variant-block"><div className="variant-lbl">Variant {j+1}</div><div className="variant-txt">{v}</div></div>)}</div>}</td>
          <td style={{width:70,textAlign:"right"}}>{img.status==="done"&&<CopyBtn text={img.variants.join("\n\n---\n\n")} toast={showToast}/>}</td>
        </tr>)}</tbody>
      </table>}
      {allDone&&imgs.length>1&&<div style={{marginTop:12,textAlign:"right"}}>
        <CopyBtn text={imgs.filter(i=>i.variants?.length).map(i=>`${i.name}\n${i.desc}\n\n${i.variants.map((v,j)=>`Variant ${j+1}:\n${v}`).join("\n\n")}`).join("\n\n---\n\n")} toast={showToast} label="Kopier alle"/>
      </div>}
      {!imgs.length&&<div style={{padding:"40px 0",textAlign:"center",color:"var(--mid)",fontSize:12}}>Last opp bilder for å starte</div>}
    </div>
  </div>;
}

/* ══ BILDERREKKEFØLGE TAB ══ */
function OrderTab({k,state,setState,showToast}){
  const {imgs,plat,goal,res,load,err,over,order}=state;
  const set=(key,val)=>setState(s=>({...s,[key]:val}));
  const ref=useRef();

  const loadFiles=files=>{
    Array.from(files).forEach(f=>{
      if(!f.type.startsWith("image/")) return;
      const r=new FileReader();
      r.onload=e=>setState(s=>({...s,imgs:[...s.imgs,{name:f.name,mime:f.type,data:e.target.result.split(",")[1],url:e.target.result}]}));
      r.readAsDataURL(f);
    });
  };

  const moveImg=(from,to)=>{
    setState(s=>{
      const a=[...s.imgs]; const [item]=a.splice(from,1); a.splice(to,0,item);
      return {...s,imgs:a,res:"",order:[]};
    });
  };

  const go=async()=>{
    if(imgs.length<2){set("err","Last opp minst 2 bilder.");return;}
    set("err","");set("load",true);set("res","");set("order",[]);
    const streamRef=React.createRef(); streamRef.current="";
    const content=[];
    imgs.forEach((img,i)=>{
      content.push({type:"text",text:`BILDE ${i+1}: "${img.name}"`});
      content.push({type:"image",source:{type:"base64",media_type:img.mime,data:img.data}});
    });
    content.push({type:"text",text:`${imgs.length} bilder fra Novooi sin bildebank.\nPlattform: ${plat}${goal?`\nKampanjemål: ${goal}`:""}\n\n1. Kort beskrivelse av hvert bilde\n2. Anbefalt publiseringsrekkefølge. Skriv NØYAKTIG: "Anbefalt rekkefølge: X, X, X"\n3. Begrunnelse (visuell flyt, storytelling, Novooi-estetikk)\n4. Caption-ide per bilde\n\nSkriv på norsk. Ingen em-dash.`});
    await streamClaude(k,[{role:"user",content}],
      chunk=>{streamRef.current+=chunk;set("res",streamRef.current);},
      ()=>{
        set("load",false);
        const m=streamRef.current.match(/[Aa]nbefalt\s+rekkef[øo]lge:\s*([0-9,\s]+)/);
        if(m){ const nums=m[1].split(/[,\s]+/).map(n=>parseInt(n.trim())-1).filter(n=>!isNaN(n)&&n>=0&&n<imgs.length); if(nums.length>0) set("order",nums); }
      },
      e=>{set("err",e);set("load",false);}
    );
  };

  const orderedImgs=order.length>0?order.map(i=>imgs[i]).filter(Boolean):[];

  return <div className="page">
    <div className="input-panel">
      <p className="page-title">Bilderrekkefølge</p>
      <p className="page-sub">Last opp bilder, sorter manuelt eller la AI anbefale rekkefølge</p>
      <div className={`drop${over?" over":""}`} style={{minHeight:90}}
        onDragOver={e=>{e.preventDefault();set("over",true);}}
        onDragLeave={()=>set("over",false)}
        onDrop={e=>{e.preventDefault();set("over",false);loadFiles(e.dataTransfer.files);}}
        onClick={()=>ref.current.click()}>
        <div className="drop-txt"><strong>Dra bilder hit</strong>Hold ⌘ / Ctrl for å velge flere</div>
        <input ref={ref} type="file" accept="image/*" multiple style={{display:"none"}} onChange={e=>loadFiles(e.target.files)}/>
      </div>
      {imgs.length>0&&<>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
          <label style={{margin:0}}>{imgs.length} bilder — dra for å sortere</label>
          <button className="btn-ghost" onClick={()=>setState(s=>({...s,imgs:[],res:"",order:[]}))}>Fjern alle</button>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:4,marginBottom:16}}>
          {imgs.map((img,i)=><div key={i} style={{display:"flex",alignItems:"center",gap:8,background:"var(--white)",border:"1px solid var(--line)",padding:"6px 8px"}}>
            <img src={img.url} alt="" style={{width:36,height:36,objectFit:"cover",border:"1px solid var(--line)"}}/>
            <span style={{flex:1,fontSize:10,color:"var(--mid)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{i+1}. {img.name}</span>
            <div style={{display:"flex",gap:3}}>
              <button className="btn-ghost" style={{padding:"2px 7px"}} disabled={i===0} onClick={()=>moveImg(i,i-1)}>↑</button>
              <button className="btn-ghost" style={{padding:"2px 7px"}} disabled={i===imgs.length-1} onClick={()=>moveImg(i,i+1)}>↓</button>
            </div>
          </div>)}
        </div>
      </>}
      <label>Plattform</label>
      <div className="chips">{PLAT.map(p=><button key={p} className={`chip${plat===p?" on":""}`} onClick={()=>set("plat",p)}>{p}</button>)}</div>
      <div className="field"><label>Kampanjemål (valgfritt)</label>
        <input type="text" placeholder="F.eks. ny leverandør, sesong, utstilling..." value={goal} onChange={e=>set("goal",e.target.value)}/>
      </div>
      <button id="main-gen-btn" className="btn" onClick={go} disabled={load||imgs.length<2} style={{width:"100%"}}>
        {load?"Analyserer…":"Analyser og anbefal rekkefølge"}
      </button>
      {err&&<p className="err">{err}</p>}
    </div>
    <div className="output-panel">
      {load&&<div className="loading"><div className="dot"/><div className="dot"/><div className="dot"/>Analyserer bilder</div>}
      {orderedImgs.length>0&&<>
        <div style={{marginBottom:10}}><label>Anbefalt rekkefølge</label></div>
        <div className="img-grid" style={{marginBottom:24}}>
          {orderedImgs.map((img,pos)=><div key={pos} className="img-card">
            <img className="img-thumb" src={img.url} alt={img.name}/>
            <div className="img-name">{img.name}</div>
            <div className="order-badge">{pos+1}</div>
          </div>)}
        </div>
      </>}
      {res&&<div className="result-box">
        <div className="result-head"><span className="result-tag">Analyse og strategi</span><CopyBtn text={res} toast={showToast}/></div>
        <div className="result-body">{res}</div>
      </div>}
      {!res&&!load&&<div style={{padding:"40px 0",textAlign:"center",color:"var(--mid)",fontSize:12}}>Last opp og sorter bilder, deretter analyser</div>}
    </div>
  </div>;
}

/* ══ POST-ANALYSE TAB ══ */
function AnalyseTab({k,state,setState,showToast}){
  const {inputText,plat,res,load,err}=state;
  const set=(key,val)=>setState(s=>({...s,[key]:val}));
  const streamRef=useRef("");

  const go=async()=>{
    if(!inputText.trim()){set("err","Lim inn en caption.");return;}
    set("err","");set("load",true);set("res","");
    streamRef.current="";
    const prompt=`Analyser denne Novooi-captions:\n\n"${inputText}"\n\nPlattform: ${plat}\n\nGi:\n1. SCORE: X/10 for Novooi-tone (med kort begrunnelse)\n2. HVA FUNGERER: konkrete styrker i teksten\n3. HVA BØR ENDRES: spesifikke svakheter (em-dash, AI-fraser, lengde, hashtags, tone)\n4. FORBEDRET VERSJON: skriv en bedre versjon i Novooi sin tone\n\nVær ærlig og konkret. Ingen vage komplimenter.`;
    await streamClaude(k,[{role:"user",content:prompt}],
      chunk=>{streamRef.current+=chunk;set("res",streamRef.current);},
      ()=>set("load",false),
      e=>{set("err",e);set("load",false);}
    );
  };

  const score=res?res.match(/(\d+)\/10/)?.[1]:null;

  return <div className="page">
    <div className="input-panel">
      <p className="page-title">Post-analyse</p>
      <p className="page-sub">Lim inn en eksisterende caption for vurdering og forbedring</p>
      <label>Plattform</label>
      <div className="chips">{PLAT.map(p=><button key={p} className={`chip${plat===p?" on":""}`} onClick={()=>set("plat",p)}>{p}</button>)}</div>
      <div className="field"><label>Caption som skal analyseres</label>
        <textarea rows={8} placeholder="Lim inn eksisterende caption her..." value={inputText} onChange={e=>set("inputText",e.target.value)}/>
        <CharCounter text={inputText} plat={plat}/>
      </div>
      <button id="main-gen-btn" className="btn" onClick={go} disabled={load} style={{width:"100%"}}>{load?"Analyserer…":"Analyser caption"}</button>
      {err&&<p className="err">{err}</p>}
    </div>
    <div className="output-panel">
      {load&&<div className="loading"><div className="dot"/><div className="dot"/><div className="dot"/>Analyserer</div>}
      {score&&<div className="score-row">
        <div className="score-ring">{score}</div>
        <div><div style={{fontSize:10,letter_spacing:"1px",textTransform:"uppercase",color:"var(--mid)",marginBottom:4}}>Novooi-score</div>
        <div style={{fontSize:13,color:"var(--ink)"}}>av 10 poeng</div></div>
      </div>}
      {res&&<div className="result-box">
        <div className="result-head"><span className="result-tag">Analyse og forslag</span><CopyBtn text={res} toast={showToast}/></div>
        <div className={`result-body${load?" streaming":""}`}>{res}</div>
      </div>}
      {!res&&!load&&<div style={{padding:"40px 0",textAlign:"center",color:"var(--mid)",fontSize:12}}>Lim inn en caption og trykk analyser</div>}
    </div>
  </div>;
}

/* ══ SETTINGS PANEL ══ */
function SettingsPanel({context,setContext,brandMemory,setBrandMemory,onClose,showToast}){
  const [ctx,setCtx]=useState(context);
  const [mem,setMem]=useState(brandMemory);
  const save=()=>{
    setContext(ctx); setBrandMemory(mem);
    try{ localStorage.setItem("nv_brand_mem",mem); }catch(e){}
    showToast("Innstillinger lagret"); onClose();
  };
  return <div className="settings-overlay" onClick={e=>{if(e.target.className==="settings-overlay")onClose();}}>
    <div className="settings-panel">
      <div className="settings-title">
        Innstillinger
        <button className="btn-ghost" onClick={onClose}>Lukk</button>
      </div>

      <div className="settings-section">
        <h3>Kampanjekontekst denne uken</h3>
        <p style={{fontSize:11,color:"var(--mid)",marginBottom:10,lineHeight:1.6}}>Injiseres automatisk i alle prompts. Sett til blank når uken er over.</p>
        <textarea rows={3} placeholder="F.eks: Vi har 20% på Northern-lamper til søndag. Fokus på vårkollesjonen. Oslo Design Fair 14. mars." value={ctx} onChange={e=>setCtx(e.target.value)}/>
      </div>

      <div className="settings-section">
        <h3>Merkevare-notater</h3>
        <p style={{fontSize:11,color:"var(--mid)",marginBottom:10,lineHeight:1.6}}>Fast informasjon om Novooi som alltid er tilgjengelig. Lagres mellom øktene.</p>
        <textarea rows={6} placeholder="F.eks: Våre mest populære merker: Northern, LK Hjelle, Fjordfiesta. Pågående samarbeidspartnere: OMGI Hytter, Munch Museet. Vår butikk i Oslo er åpen tir-tor 10-16." value={mem} onChange={e=>setMem(e.target.value)}/>
      </div>

      <div className="settings-section">
        <h3>Tastatursnarveier</h3>
        <div style={{fontSize:11,lineHeight:2,color:"var(--ink)"}}>
          <div><span className="kbd">⌘ + ↵</span> Generer på aktiv fane</div>
          <div><span className="kbd">⌘ + K</span> Bytt fane</div>
        </div>
      </div>

      <button className="btn" onClick={save} style={{width:"100%"}}>Lagre</button>
    </div>
  </div>;
}

/* ══ LOCK SCREEN ══ */
function LockScreen({onUnlock}){
  const [suffix,setSuffix]=useState("");
  const [checking,setChecking]=useState(false);
  const [err,setErr]=useState("");
  const attempt=async()=>{
    if(!suffix.trim()) return;
    setErr("");setChecking(true);
    try{ await validateKey(KEY_PREFIX+suffix.trim()); onUnlock(KEY_PREFIX+suffix.trim()); }
    catch(e){ setErr("Feil tilgangskode — prøv igjen."); setSuffix(""); }
    setChecking(false);
  };
  return <div className="lock">
    <div className="lock-box">
      <div className="lock-logo">markeds<em>agent</em></div>
      <div className="lock-sub">Novooi — Norsk design, interiør og kunsthåndverk</div>
      <span className="lock-lbl">Skriv inn tilgangskoden</span>
      <input className="lock-inp" type="password" maxLength={4} placeholder="····" value={suffix}
        onChange={e=>{setSuffix(e.target.value);setErr("");}}
        onKeyDown={e=>e.key==="Enter"&&!checking&&attempt()}
        style={err?{borderBottomColor:"var(--red)"}:{}} autoFocus disabled={checking}/>
      {err&&<p style={{fontSize:11,color:"var(--red)",marginTop:-18,marginBottom:16}}>{err}</p>}
      {checking
        ?<div className="loading" style={{justifyContent:"center",padding:"0 0 16px"}}><div className="dot"/><div className="dot"/><div className="dot"/>Verifiserer</div>
        :<button className="btn" style={{width:"100%"}} onClick={attempt}>Logg inn</button>}
    </div>
  </div>;
}

/* ══ APP ══ */
const INIT={
  innhold: {mode:"single",topic:"",tone:"Profesjonell",plat:"Instagram",extra:"",res:"",resB:"",abMode:false,load:false,err:"",focus:"",posts:"5",cal:null,raw:"",expandedDay:null},
  image:   {imgs:[],plat:"Instagram",tone:"Profesjonell",load:false,err:"",over:false},
  order:   {imgs:[],plat:"Instagram",goal:"",res:"",load:false,err:"",over:false,order:[]},
  analyse: {inputText:"",plat:"Instagram",res:"",load:false,err:""},
};

function App(){
  const [tab,setTab]=useState("innhold");
  const [key,setKey]=useState("");
  const [ts,setTs]=useState(INIT);
  const [dark,setDark]=useState(()=>{ try{return localStorage.getItem("nv_dark")==="1";}catch(e){return false;} });
  const [context,setContext]=useState("");
  const [brandMemory,setBrandMemory]=useState(()=>{ try{return localStorage.getItem("nv_brand_mem")||"";}catch(e){return "";} });
  const [showSettings,setShowSettings]=useState(false);
  const [toastState,showToast]=useToast();

  const setS=id=>fn=>setTs(s=>({...s,[id]:fn(s[id])}));
  const TABS=[["innhold","Innhold"],["image","Bildeanalyse"],["order","Bilderrekkefølge"],["analyse","Post-analyse"]];

  useEffect(()=>{
    document.body.classList.toggle("dark",dark);
    try{localStorage.setItem("nv_dark",dark?"1":"0");}catch(e){}
  },[dark]);

  useEffect(()=>{
    const handler=e=>{
      if((e.metaKey||e.ctrlKey)&&e.key==="Enter"){e.preventDefault();document.getElementById("main-gen-btn")?.click();}
      if((e.metaKey||e.ctrlKey)&&e.key==="k"){e.preventDefault();setTab(t=>{const idx=TABS.findIndex(x=>x[0]===t);return TABS[(idx+1)%TABS.length][0];});}
    };
    document.addEventListener("keydown",handler);
    return()=>document.removeEventListener("keydown",handler);
  },[]);

  if(!key) return <LockScreen onUnlock={setKey}/>;

  return <>
    <div className="header">
      <div className="logo">markeds<em>agent</em></div>
      <div className="hdr-right">
        {context&&<span className="ctx-badge">✦ Kampanje aktiv</span>}
        <button className="icon-btn" title="Innstillinger og merkevare-notater" onClick={()=>setShowSettings(true)}>⚙</button>
        <button className="icon-btn" title={dark?"Lyst modus":"Mørkt modus"} onClick={()=>setDark(d=>!d)}>{dark?"☀":"☾"}</button>
        <button className="btn-ghost" onClick={()=>setKey("")}>Logg ut</button>
      </div>
    </div>
    <div className="nav">
      {TABS.map(([id,label])=><button key={id} className={`tab${tab===id?" active":""}`} onClick={()=>setTab(id)}>{label}</button>)}
    </div>
    {context&&<div className="ctx-banner">
      <strong>Denne uken:</strong> {context}
      <button onClick={()=>setContext("")}>Fjern</button>
    </div>}

    {tab==="innhold"  &&<InnholdTab  k={key} state={ts.innhold} setState={setS("innhold")} context={context} brandMemory={brandMemory} showToast={showToast}/>}
    {tab==="image"    &&<ImageTab    k={key} state={ts.image}   setState={setS("image")}   showToast={showToast}/>}
    {tab==="order"    &&<OrderTab    k={key} state={ts.order}   setState={setS("order")}   showToast={showToast}/>}
    {tab==="analyse"  &&<AnalyseTab  k={key} state={ts.analyse} setState={setS("analyse")} showToast={showToast}/>}

    {showSettings&&<SettingsPanel context={context} setContext={setContext} brandMemory={brandMemory} setBrandMemory={setBrandMemory} onClose={()=>setShowSettings(false)} showToast={showToast}/>}
    <Toast msg={toastState.msg} show={toastState.show}/>
  </>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
